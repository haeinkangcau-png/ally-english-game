<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Ally's Handwriting Practice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#fff; font-family:'Nunito',sans-serif; }

  @page { size: A4; margin: 0; }
  @media print {
    body { margin:0; }
    .page { margin:0; box-shadow:none; }
  }

  .page {
    width:210mm; height:297mm;
    margin:0 auto;
    background:#fff;
    padding:8mm 12mm 8mm;
    display:flex; flex-direction:column;
  }

  .header {
    text-align:center; margin-bottom:4mm;
    border-bottom:2.5px solid #f59e0b; padding-bottom:3mm;
  }
  .header h1 { font-family:'Fredoka One',cursive; font-size:26pt; color:#f59e0b; }
  .header h1 .ally-name { color:#ff6b35; font-size:30pt; }
  .header p { font-size:11pt; color:#888; margin-top:2mm; }

  .name-row {
    display:flex; gap:10mm; margin-bottom:4mm;
    font-size:14pt; color:#555;
  }
  .name-row span { display:flex; align-items:center; gap:3mm; }
  .name-row .ul {
    display:inline-block; width:50mm; height:8mm;
    border-bottom:1.5px solid #aaa;
  }

  .lines {
    flex:1; display:flex; flex-direction:column;
    justify-content:space-between;
  }
  .row-label { font-size:10pt; color:#f59e0b; font-weight:700; margin-bottom:1mm; }
  .staff-wrap { margin-bottom:1mm; }
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <h1>✏️ <span class="ally-name">Ally</span> Handwriting</h1>
    <p>내 영어 이름 <b>Ally</b> 를 예쁘게 써 보자! ✨</p>
  </div>
  <div class="name-row">
    <span>Name <span class="ul"></span></span>
    <span>Date <span class="ul"></span></span>
  </div>
  <div class="lines" id="lines"></div>
</div>

<script>
const MODEL = 'Ally';
const PRACTICE_ROWS = 8;   // 빈 줄 개수

function staff(modelText) {
  let svg = '<svg width="100%" height="60" viewBox="0 0 800 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" style="display:block;">';
  svg += '<line x1="0" y1="1"  x2="800" y2="1"  stroke="#000" stroke-width="1"   opacity="0.25"/>';
  svg += '<line x1="0" y1="20" x2="800" y2="20" stroke="#000" stroke-width="1"   opacity="0.25"/>';
  svg += '<line x1="0" y1="40" x2="800" y2="40" stroke="#c00" stroke-width="1.5" opacity="0.35"/>';
  svg += '<line x1="0" y1="59" x2="800" y2="59" stroke="#000" stroke-width="1"   opacity="0.25"/>';
  if (modelText) {
    // 따라쓰기(trace)가 아니라 또렷한 모델 글자 — 보고 쓰기용
    svg += '<text x="10" y="40" font-family="\'Fredoka One\',cursive" font-size="40" fill="#f0a500" letter-spacing="8">' + modelText + '</text>';
  }
  svg += '</svg>';
  return '<div class="staff-wrap">' + svg + '</div>';
}

const lines = document.getElementById('lines');

// 1) 모델 줄 (또렷한 Ally 보기)
const modelBlock = document.createElement('div');
modelBlock.innerHTML = '<div class="row-label">이렇게 써요 👀</div>' + staff(MODEL);
lines.appendChild(modelBlock);

// 2) 빈 연습 줄들
for (let i = 0; i < PRACTICE_ROWS; i++) {
  const block = document.createElement('div');
  block.innerHTML = staff('');
  lines.appendChild(block);
}
</script>
</body>
</html>
