      section.appendChild(item);
    });
  }
  saveRecord(stars, correct, total, convRecordMode);
  logQuizResult(convRecordMode, correct, total, stars, convWrongQuestions.map(wq => ({ label: wq.question, sub: wq.correctAnswer })));
  buildWeeklyStrip();
  document.getElementById('emailStatus').textContent = '';
  showScreen('screen-result');
}

/* ══════════════════════════════════════════
   Flash Card Game
   ══════════════════════════════════════════ */
function showToast(emoji, msg) {
  removeToast();
  const t = document.createElement('div');
  t.className = 'word-toast'; t.id = 'fcToast';
  t.innerHTML = `<span class="toast-big">${emoji}</span>${msg}`;
  document.body.appendChild(t);
}
function removeToast() {
  document.getElementById('fcToast')?.remove();
}
const FC_COLORS = [
  { bg:'#fff0f5', border:'#ffd3d3', shadow:'#f0c8d8' },
  { bg:'#f0f5ff', border:'#c8daff', shadow:'#b0c8f5' },
  { bg:'#f0fff8', border:'#c0f0de', shadow:'#96d8bf' },
  { bg:'#fff8f0', border:'#ffd8b0', shadow:'#f0c090' },
];
let fcQueue = [], fcIdx = 0, fcWrongCount = 0, fcAnswered = false, fcRecordMode = 'main', fcWrongItems = [], fcCardMissed = false;

function fcShuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* 같은 주차 그룹(예: jun_w1a, jun_w1b)을 "이번 주"로 묶기 위한 헬퍼 */
function fcWeekGroupOf(key) { const m = key.match(/^(.*\d)[a-z]$/); return m ? m[1] : key; }
function fcDedupWords(arr) { const seen = new Set(); return arr.filter(w => { if (seen.has(w.word)) return false; seen.add(w.word); return true; }); }
function fcThisWeekWords() {
  const grp = fcWeekGroupOf(WEEK_ORDER[WEEK_ORDER.length - 1]);
  const words = [];
  WEEK_ORDER.filter(k => fcWeekGroupOf(k) === grp).forEach(k => words.push(...WORDS_DATA[k].words));
  return fcDedupWords(words);
}
function fcPrevWords() {
  const grp = fcWeekGroupOf(WEEK_ORDER[WEEK_ORDER.length - 1]);
  const words = [];
  WEEK_ORDER.filter(k => fcWeekGroupOf(k) !== grp).forEach(k => words.push(...WORDS_DATA[k].words));
  return fcDedupWords(words);
}
function fcPickWords(pool, n) {
  if (!pool.length) return [];
  const sh = fcShuffle([...pool]); const out = [];
  while (out.length < n) out.push(...sh);
  return out.slice(0, n);
}
/* 오늘의 퀴즈: 총 12문제 — 이번주 한→영 3 / 영→한 3 + 이전 한→영 3 / 영→한 3 */
function fcBuildQuizQueue() {
  const tw = fcThisWeekWords();
  const pv = fcPrevWords();
  const prevPool = pv.length ? pv : tw; // 이전 주가 없으면 이번 주로 보충
  const q = [];
  fcPickWords(tw, 3).forEach(w => q.push({ ...w, mode: 'ko2en', pool: tw }));
  fcPickWords(tw, 3).forEach(w => q.push({ ...w, mode: 'en2ko', pool: tw }));
  fcPickWords(prevPool, 3).forEach(w => q.push({ ...w, mode: 'ko2en', pool: prevPool }));
  fcPickWords(prevPool, 3).forEach(w => q.push({ ...w, mode: 'en2ko', pool: prevPool }));
  return fcShuffle(q);
}
/* 오늘의 복습: 이번 주(a·b) 전체, 양방향, 최대 20문제. 모든 단어가 1회 이상 나오도록 균등 분배 */
function fcBuildReviewQueue() {
  const tw = fcThisWeekWords();
  const N = tw.length, CAP = 20;
  let koEn, enKo;
  if (N * 2 <= CAP) {
    // 단어가 10개 이하: 모든 단어를 양방향(2N문제)으로
    koEn = fcShuffle([...tw]); enKo = fcShuffle([...tw]);
  } else {
    // 단어가 10개 초과: 방향당 10문제. 한→영이 못 다룬 단어를 영→한에 우선 배치해 전 단어 1회 이상 보장
    const perDir = Math.floor(CAP / 2);
    const sh = fcShuffle([...tw]);
    koEn = sh.slice(0, perDir);
    let rest = sh.slice(perDir, perDir * 2);
    if (rest.length < perDir) rest = rest.concat(fcShuffle([...koEn]).slice(0, perDir - rest.length));
    enKo = fcShuffle(rest);
  }
  const q = [];
  koEn.forEach(w => q.push({ ...w, mode: 'ko2en', pool: tw }));
  enKo.forEach(w => q.push({ ...w, mode: 'en2ko', pool: tw }));
  return fcShuffle(q);
}
function startFlashGame(recordMode = 'main') {
  currentMode = 'flash';
  fcRecordMode = recordMode;
  fcQueue = recordMode === 'review' ? fcBuildReviewQueue() : fcBuildQuizQueue();
  fcIdx = 0; fcWrongCount = 0; fcAnswered = false; fcWrongItems = []; fcCardMissed = false;
  showScreen('screen-flash');
  fcLoadCard();
}

function fcLoadCard() {
  fcAnswered = false;
  fcCardMissed = false;
  document.getElementById('fcAnswerPanel').classList.remove('visible');
  const item = fcQueue[fcIdx];
  const total = fcQueue.length;
  const isEn = item.mode === 'en2ko';
  const weekWords = item.pool || WORDS_DATA[WEEK_ORDER[WEEK_ORDER.length - 1]].words;

  document.getElementById('fcProgressFill').style.width = (fcIdx / total * 100) + '%';
  document.getElementById('fcProgressLabel').textContent = `${fcIdx + 1} / ${total}`;
  document.getElementById('fcTagText').textContent = isEn ? '어떤 뜻일까? 🤔' : '영어로는? ✏️';

  if (isEn) {
    document.getElementById('fcWord').textContent = item.word;
    document.getElementById('fcPron').textContent = `[${item.pron}]`;
    document.getElementById('fcPron').style.display = '';
    document.getElementById('fcSoundBtn').style.display = '';
    const others = fcShuffle(weekWords.filter(x => x.meaning !== item.meaning)).slice(0, 3);
    fcRenderChoices(fcShuffle([
      { label: item.meaning, correct: true },
      ...others.map(x => ({ label: x.meaning, correct: false })),
    ]));
    setTimeout(() => fcSpeak(item.speak || item.word), 300);
  } else {
    document.getElementById('fcWord').textContent = item.meaning;
    document.getElementById('fcPron').style.display = 'none';
    document.getElementById('fcSoundBtn').style.display = 'none';
    const others = fcShuffle(weekWords.filter(x => x.word !== item.word)).slice(0, 3);
    fcRenderChoices(fcShuffle([
      { label: item.word, correct: true },
      ...others.map(x => ({ label: x.word, correct: false })),
    ]));
  }
}

function fcRenderChoices(choices) {
  const container = document.getElementById('fcChoices');
  container.innerHTML = '';
  const labels = ['①', '②', '③', '④'];
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'fc-choice-btn';
    const col = FC_COLORS[i];
    btn.style.cssText = `background:${col.bg};border-color:${col.border};box-shadow:0 4px 0 0 ${col.shadow}`;
    btn.innerHTML = c.label;
    btn.onclick = () => fcSelectAnswer(btn, c.correct);
    container.appendChild(btn);
  });
}

function fcAdvance() {
  fcIdx++;
  if (fcIdx < fcQueue.length) fcLoadCard();
  else fcShowResult();
}

function fcSelectAnswer(btn, isCorrect) {
  if (fcAnswered) return;
  if (isCorrect) {
    fcAnswered = true;
    document.querySelectorAll('.fc-choice-btn').forEach(b => { b.style.pointerEvents = 'none'; });
    btn.classList.add('correct');
    playSound('correct');
    const item = fcQueue[fcIdx];
    if (item.mode === 'ko2en') {
      document.getElementById('fcApEmoji').textContent = item.emoji || '✨';
      document.getElementById('fcApWord').textContent = item.word;
      document.getElementById('fcApPron').textContent = `[${item.pron}]`;
      document.getElementById('fcApSndBtn').onclick = () => fcSpeak(item.speak || item.word);
      document.getElementById('fcAnswerPanel').classList.add('visible');
      fcSpeak(item.speak || item.word);
    } else {
      showToast('🎉', '정답이에요!');
    }
    setTimeout(() => { removeToast(); fcAdvance(); }, 1400);
  } else {
    fcWrongCount++;
    if (!fcCardMissed) {
      fcCardMissed = true;
      const it = fcQueue[fcIdx];
      fcWrongItems.push({ label: it.word, sub: it.meaning });
    }
    btn.style.pointerEvents = 'none';
    btn.classList.add('wrong', 'fc-shake');
    showToast('😢', '다시 한번!');
    playSound('wrong');
    setTimeout(removeToast, 900);
  }
}

function fcSpeak(word) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.rate = 0.85; u.pitch = 1.1;
  applyEnVoice(u);
  window.speechSynthesis.speak(u);
}
function fcSpeakCurrent() {
  const item = fcQueue[fcIdx];
  if (item) fcSpeak(item.speak || item.word);
}

function fcShowResult() {
  const total = fcQueue.length;
  const correct = total - fcWrongCount;
  const stars = starRating(correct, total);
  const msgs = [
    ['조금 더 연습해봐요!', '괜찮아요, 다시 하면 잘할 수 있어요 💪'],
    ['잘하고 있어요!', '거의 다 맞췄어요 👏'],
    ['완벽해요! 🎉', '모든 단어를 맞췄어요!'],
  ];
  const [mm, sm] = msgs[stars - 1];
  document.getElementById('starsDisplay').innerHTML = [0,1,2].map(i => starSvg(i < stars)).join('');
  document.getElementById('resultMsg').textContent = `${total}개 중 ${correct}개 정답! ${mm}`;
  document.getElementById('resultSub').textContent = sm;
  document.getElementById('wrongSection').innerHTML = '';
  saveRecord(stars, correct, total, fcRecordMode);
  logQuizResult(fcRecordMode, correct, total, stars, fcWrongItems.map(w => ({ label: w.label, sub: w.sub })));
  buildWeeklyStrip();
  showScreen('screen-result');
}

initStart();
</script>
