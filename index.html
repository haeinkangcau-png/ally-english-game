<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ally's English Game ♡</title>
  <link rel="icon" type="image/png" href="assets/bunny.png">
  <link rel="apple-touch-icon" href="assets/bunny.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff8e9d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Ally's Game">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Jua&display=swap" rel="stylesheet">
  <script src="words.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    /* ═════════════════════════════════════════
       Ally's English Game — Kawaii / Sanrio
       Palette
       ═════════════════════════════════════════ */
    :root {
      /* surfaces */
      --bg-1:    #fff3ed;     /* cream pink */
      --bg-2:    #f3e8ff;     /* soft lavender */
      --bg-3:    #e0f2fe;     /* sky baby blue */
      --paper:   #fff8f3;     /* card cream */
      --paper-2: #fff5ee;     /* card cream subtle */
      /* accents */
      --pink:    #ff8e9d;     /* primary candy pink */
      --pink-d:  #ed7589;     /* deep pink */
      --pink-s:  #ffd3d3;     /* soft pink */
      --pink-x:  #ffe6e0;     /* extra soft pink */
      --mint:    #9adfc4;     /* sanrio mint */
      --blue:    #a8caff;     /* baby blue */
      --lav:     #c8b9f5;     /* lavender */
      --butter:  #ffe186;     /* butter yellow */
      --peach:   #ffbf9a;     /* peach */
      /* ink */
      --ink:     #5a4658;     /* warm plum-brown */
      --ink-2:   #8a7787;     /* muted plum */
      --ink-3:   #b9a8b3;     /* faint plum */
      --line:    #f5d8d0;     /* hairline */
      /* shadow */
      --sh-soft: 0 6px 0 0 #f0c8d8;
      --sh-card: 0 12px 28px -8px rgba(255, 142, 157, 0.28), 0 2px 0 0 #fbd7cd;
      --sh-pop:  0 10px 24px -6px rgba(168, 130, 200, 0.35);
    }

    /* ───────── Reset ───────── */
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    button { font: inherit; color: inherit; }

    html, body { min-height: 100dvh; }
    body {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-weight: 700;
      color: var(--ink);
      word-break: keep-all;
      background:
        radial-gradient(at 12% 8%, #ffdfd5 0%, transparent 38%),
        radial-gradient(at 88% 14%, #e2d9ff 0%, transparent 42%),
        radial-gradient(at 50% 92%, #d6ecff 0%, transparent 45%),
        linear-gradient(170deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-3) 100%);
      background-attachment: fixed;
      min-height: 100dvh;
      overflow-x: hidden;
      position: relative;
    }

    /* Decorative floating shapes — full screen, behind everything */
    .deco {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .deco svg { position: absolute; opacity: 0.55; }
    .deco .d1 { top: 4%;  left: 4%;  width: 64px; animation: floaty 7s ease-in-out infinite; }
    .deco .d2 { top: 18%; right: 6%; width: 52px; animation: floaty 9s ease-in-out infinite 1s; }
    .deco .d3 { top: 62%; left: 3%;  width: 44px; animation: floaty 8s ease-in-out infinite 2s; }
    .deco .d4 { top: 78%; right: 4%; width: 72px; animation: floaty 10s ease-in-out infinite .5s; }
    .deco .d5 { top: 42%; right: 2%; width: 38px; animation: floaty 6s ease-in-out infinite 1.5s; }
    .deco .d6 { top: 86%; left: 30%; width: 36px; animation: floaty 7.5s ease-in-out infinite 2.5s; }
    .deco .d7 { top: 6%;  left: 48%; width: 42px; animation: floaty 8.5s ease-in-out infinite 1.8s; }
    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%      { transform: translateY(-14px) rotate(4deg); }
    }
    @media (max-width: 520px) {
      .deco .d1, .deco .d7 { display: none; }
    }

    /* ───────── Layout shell ───────── */
    .stage {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 18px 16px 48px;
    }
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
    }
    @media (min-width: 720px) {
      .stage { padding: 28px 28px 64px; }
      .screen { max-width: 680px; }
    }
    @media (min-width: 1024px) {
      .screen { max-width: 760px; }
    }

    /* ═══════════════════════════════════════
       START SCREEN
       ═══════════════════════════════════════ */
    .hero {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
      margin: 6px 0 22px;
    }
    .hero-text { padding-bottom: 6px; }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Jua', 'Pretendard Variable', Pretendard, sans-serif;
      font-size: 0.9rem; color: var(--pink-d);
      background: white;
      padding: 5px 12px 4px; border-radius: 999px;
      box-shadow: 0 2px 0 0 var(--pink-s);
      margin-bottom: 10px;
      white-space: nowrap;
      word-break: keep-all;
    }
    .hero-title {
      font-family: 'Fredoka', 'Jua', sans-serif;
      font-weight: 700;
      font-size: clamp(2rem, 6vw, 2.8rem);
      line-height: 1;
      color: var(--ink);
      letter-spacing: -0.5px;
    }
    .hero-title .ally {
      color: var(--pink-d);
      display: inline-block;
      transform: rotate(-3deg);
    }
    .hero-title .sparkle { color: var(--butter); }
    .hero-sub {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-weight: 400;
      font-size: 1.05rem;
      color: var(--ink-2);
      margin-top: 6px;
    }
    .hero-mascot {
      width: 130px;
      height: auto;
      object-fit: contain;
      flex-shrink: 0;
      filter: drop-shadow(0 6px 12px rgba(200, 130, 160, 0.22));
    }
    @media (min-width: 720px) {
      .hero-mascot { width: 200px; }
      .hero-title { font-size: 3.4rem; }
      .hero-sub { font-size: 1.25rem; }
    }

    /* ── Mode tabs ── */
    .mode-tabs {
      display: flex; width: 100%; gap: 10px; margin-bottom: 18px;
    }
    .mode-tab {
      flex: 1;
      padding: 14px 10px 12px;
      border-radius: 22px;
      border: none;
      background: var(--paper);
      box-shadow: 0 4px 0 0 #f8d6cd, inset 0 0 0 2px #fbe2d6;
      font-family: 'Jua', 'Pretendard Variable', Pretendard, sans-serif;
      font-size: 1.05rem; color: var(--ink-2);
      cursor: pointer; touch-action: manipulation;
      transition: transform .12s, box-shadow .12s, background .15s, color .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .mode-tab svg { width: 24px; height: 24px; flex: 0 0 auto; }
    .mode-tab:active { transform: translateY(2px); box-shadow: 0 2px 0 0 #f8d6cd, inset 0 0 0 2px #fbe2d6; }
    .mode-tab.active {
      background: linear-gradient(180deg, #fff 0%, #ffe5dc 100%);
      color: var(--pink-d);
      box-shadow: 0 4px 0 0 var(--pink), inset 0 0 0 2px var(--pink);
    }

    /* ── Review list ── */
    .review-list {
      display: none; flex-direction: column; gap: 10px;
      width: 100%; margin-bottom: 18px;
    }
    .review-list.visible { display: flex; }
    .review-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-radius: 18px;
      background: var(--paper);
      box-shadow: 0 3px 0 0 #f0d8cf, inset 0 0 0 1.5px #f9e0d4;
      cursor: pointer; touch-action: manipulation;
      transition: transform .12s, box-shadow .12s;
    }
    .review-item:active { transform: translateY(1px); }
    .review-item.selected {
      background: linear-gradient(180deg, #fff 0%, #fff5ee 100%);
      box-shadow: 0 3px 0 0 var(--pink), inset 0 0 0 2px var(--pink);
    }
    .ri-dot {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--pink-s);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Jua', sans-serif; color: var(--pink-d); font-size: 0.95rem;
    }
    .review-item.selected .ri-dot { background: var(--pink); color: white; }
    .ri-label {
      flex: 1;
      font-family: 'Jua', 'Pretendard Variable', Pretendard, sans-serif;
      font-size: 1.05rem; color: var(--ink);
    }
    .ri-count {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-size: 0.9rem; color: var(--ink-3);
      white-space: nowrap; word-break: keep-all;
      flex: 0 0 auto;
    }
    .badge {
      display: inline-block; vertical-align: 1px;
      background: var(--pink);
      color: white; font-family: 'Jua', sans-serif;
      font-size: 0.7rem; padding: 1px 8px 0; border-radius: 999px;
      margin-left: 6px;
    }

    /* ── Section label ── */
    .section-label {
      font-family: 'Jua', sans-serif;
      font-size: 1.05rem; color: var(--ink);
      align-self: flex-start;
      margin: 6px 0 10px 4px;
      display: flex; align-items: center; gap: 6px;
      white-space: nowrap; word-break: keep-all;
    }
    .section-label svg { width: 18px; height: 18px; color: var(--pink); flex: 0 0 auto; }

    /* Generic screen title used in non-game screens */
    .screen-title {
      flex: 1; text-align: center;
      font-family: 'Jua', sans-serif;
      font-size: 1.15rem; color: var(--ink);
      white-space: nowrap; word-break: keep-all;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .screen-title svg { width: 18px; height: 18px; color: var(--pink); }

    /* ── Difficulty ── */
    .difficulty-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 10px; width: 100%; margin-bottom: 22px;
    }
    .diff-btn {
      padding: 14px 6px 14px;
      border-radius: 22px;
      border: none;
      background: var(--paper);
      box-shadow: 0 4px 0 0 #f0d8cf, inset 0 0 0 2px #f9e0d4;
      cursor: pointer; touch-action: manipulation;
      transition: transform .12s, box-shadow .12s;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      font-family: 'Jua', 'Pretendard Variable', Pretendard, sans-serif;
      position: relative;
    }
    .diff-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 0 #f0d8cf, inset 0 0 0 2px #f9e0d4; }
    .diff-btn .d-face {
      width: 54px; height: 54px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem;
      box-shadow: inset 0 -4px 0 0 rgba(0,0,0,0.05), 0 2px 0 0 rgba(255,255,255,0.6);
      margin-bottom: 2px;
    }
    .diff-btn .d-name {
      font-size: 1.05rem; color: var(--ink); line-height: 1;
      white-space: nowrap; word-break: keep-all;
    }
    .diff-btn .d-hint {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-weight: 500; font-size: 0.78rem; color: var(--ink-3); line-height: 1.1;
      white-space: nowrap; word-break: keep-all;
      letter-spacing: -0.2px;
    }
    .diff-btn[data-d="very-easy"] .d-face { background: linear-gradient(160deg, #c5ecdc 0%, var(--mint) 100%); }
    .diff-btn[data-d="easy"]      .d-face { background: linear-gradient(160deg, #c8defc 0%, var(--blue) 100%); }
    .diff-btn[data-d="hard"]      .d-face { background: linear-gradient(160deg, #ffd2b8 0%, var(--peach) 100%); }
    .diff-btn.selected {
      background: linear-gradient(180deg, #fff 0%, #fff5ee 100%);
      box-shadow: 0 4px 0 0 var(--pink), inset 0 0 0 2px var(--pink);
    }
    .diff-btn.selected .d-hint { color: var(--pink-d); font-weight: 600; }
    @media (min-width: 720px) {
      .diff-btn { padding: 18px 8px 18px; }
      .diff-btn .d-face { width: 64px; height: 64px; font-size: 2.1rem; }
      .diff-btn .d-name { font-size: 1.15rem; }
      .diff-btn .d-hint { font-size: 0.85rem; }
    }

    /* ── Info box ── */
    .info-box {
      position: relative;
      width: 100%;
      background: var(--paper);
      border-radius: 22px;
      padding: 16px 18px 16px 22px;
      margin-bottom: 26px;
      box-shadow: var(--sh-card);
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-weight: 400;
      font-size: 1.05rem; color: var(--ink-2);
      line-height: 1.6;
    }
    .info-box::before {
      content: '';
      position: absolute; left: 0; top: 14px; bottom: 14px; width: 4px;
      background: var(--pink); border-radius: 4px;
    }
    .info-box strong { font-weight: 700; color: var(--pink-d); }

    /* ── Start button (primary) ── */
    .start-btn {
      position: relative;
      width: 100%;
      background: linear-gradient(180deg, #ff9da6 0%, var(--pink) 60%, var(--pink-d) 100%);
      color: white; border: none;
      border-radius: 24px;
      padding: 18px 28px 20px;
      font-family: 'Fredoka', 'Jua', sans-serif;
      font-weight: 700;
      font-size: 1.55rem;
      letter-spacing: 0.5px;
      cursor: pointer; touch-action: manipulation;
      box-shadow: 0 6px 0 0 var(--pink-d), 0 14px 26px -8px rgba(237,117,137,0.55);
      transition: transform .1s, box-shadow .1s;
    }
    .start-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 0 var(--pink-d), 0 6px 14px -6px rgba(237,117,137,0.6);
    }
    .start-btn::after {
      content: '♡';
      position: absolute; top: -10px; right: -8px;
      width: 30px; height: 30px;
      background: var(--butter); color: var(--pink-d);
      font-family: 'Fredoka', sans-serif; font-size: 1.05rem;
      border-radius: 50%;
      display: grid; place-items: center;
      box-shadow: 0 2px 0 0 #e8c454;
      transform: rotate(12deg);
    }

    /* ═══════════════════════════════════════
       GAME SCREEN
       ═══════════════════════════════════════ */
    .top-bar {
      width: 100%;
      display: flex; align-items: center; gap: 12px;
      margin: 6px 0 16px;
    }
    .home-btn {
      width: 38px; height: 38px;
      border: none; border-radius: 50%;
      background: var(--paper);
      box-shadow: 0 3px 0 0 #f0d8cf;
      cursor: pointer;
      display: grid; place-items: center;
      flex: 0 0 auto;
    }
    .home-btn svg { width: 18px; height: 18px; color: var(--pink-d); }
    .home-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 0 #f0d8cf; }
    .progress-track {
      flex: 1; height: 16px;
      background: white;
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 2px 0 0 #fbd7cd, inset 0 0 0 2px #fbd7cd;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pink) 0%, var(--lav) 60%, var(--blue) 100%);
      border-radius: 999px;
      transition: width 0.6s cubic-bezier(.22,1,.36,1);
      width: 0%;
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute; top: 2px; left: 6px; right: 6px; height: 4px;
      background: rgba(255,255,255,0.55); border-radius: 999px;
    }
    .progress-label {
      font-family: 'Jua', sans-serif;
      font-size: 1rem; color: var(--ink);
      background: white;
      padding: 6px 12px 5px;
      border-radius: 999px;
      box-shadow: 0 3px 0 0 #fbd7cd;
      white-space: nowrap;
    }

    /* ── Game card ── */
    .game-card {
      position: relative;
      width: 100%;
      background: var(--paper);
      border-radius: 32px;
      box-shadow: var(--sh-card);
      padding: 28px 20px 24px;
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 22px;
    }
    .game-card::before {
      content: ''; position: absolute; top: 14px; left: 14px; right: 14px; bottom: 14px;
      border-radius: 22px;
      border: 2px dashed #ffd3d3;
      pointer-events: none;
      opacity: 0.5;
    }
    .game-card-tag {
      position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
      background: var(--pink); color: white;
      font-family: 'Jua', sans-serif;
      font-size: 0.85rem;
      padding: 4px 16px 3px; border-radius: 999px;
      box-shadow: 0 3px 0 0 var(--pink-d);
      display: flex; align-items: center; gap: 5px;
    }
    .game-card-tag svg { width: 14px; height: 14px; }

    .emoji-area {
      font-size: 96px;
      line-height: 1;
      min-height: 110px;
      display: flex; align-items: center; justify-content: center;
      margin: 10px 0 6px;
      position: relative;
      z-index: 2;
    }
    .emoji-area::before, .emoji-area::after {
      content: '✦'; position: absolute;
      font-family: 'Fredoka', sans-serif;
      color: var(--butter); font-size: 22px;
      opacity: 0.8;
    }
    .emoji-area::before { top: 10px; left: 8%; animation: twinkle 2.4s ease-in-out infinite; }
    .emoji-area::after  { top: 18px; right: 10%; animation: twinkle 2.4s ease-in-out infinite 1.2s; color: var(--pink); }
    @keyframes twinkle {
      0%,100% { transform: scale(.7) rotate(0); opacity: .3; }
      50%     { transform: scale(1.15) rotate(20deg); opacity: 1; }
    }
    @media (min-width: 720px) {
      .emoji-area { font-size: 130px; min-height: 150px; }
    }

    .speak-btn {
      background: white;
      border: none;
      border-radius: 999px;
      padding: 9px 22px 8px;
      font-family: 'Jua', sans-serif;
      font-size: 1rem;
      color: var(--pink-d);
      cursor: pointer; touch-action: manipulation;
      margin-bottom: 22px;
      box-shadow: 0 3px 0 0 var(--pink-s), inset 0 0 0 2px var(--pink-s);
      transition: transform .1s, box-shadow .1s;
      display: inline-flex; align-items: center; gap: 8px;
      z-index: 2;
    }
    .speak-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 0 var(--pink-s), inset 0 0 0 2px var(--pink-s); }
    .speak-btn svg { width: 18px; height: 18px; }

    .blanks-row {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 8px; margin-bottom: 18px;
      z-index: 2;
    }
    .blank-tile {
      min-width: 40px; height: 56px;
      border-bottom: 3px solid var(--ink-3);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fredoka', sans-serif; font-weight: 700;
      font-size: 32px;
      color: var(--pink-d);
      padding: 0 4px;
      transition: border-color 0.2s;
      position: relative;
    }
    .blank-tile.current {
      border-bottom-color: var(--pink);
    }
    .blank-tile.current::after {
      content: '♡';
      position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
      font-family: 'Fredoka', sans-serif; font-size: 14px;
      color: var(--pink);
      animation: bounce-arrow 1s ease-in-out infinite;
    }
    .blank-tile.filled { border-bottom-color: var(--pink); }
    .blank-tile.revealed { color: var(--lav); border-bottom-color: var(--lav); }
    .blank-tile.pop { animation: pop 0.4s cubic-bezier(.5,1.6,.45,.9); }
    @keyframes bounce-arrow {
      0%,100% { transform: translate(-50%, 0); }
      50%     { transform: translate(-50%, -4px); }
    }
    @media (min-width: 720px) {
      .blank-tile { min-width: 56px; height: 72px; font-size: 44px; }
    }

    .hint-area {
      display: flex; flex-direction: column; align-items: center;
      gap: 8px;
      margin-top: 6px;
      z-index: 2;
    }
    .hint-btn {
      background: transparent;
      border: none;
      padding: 6px 14px;
      font-family: 'Pretendard Variable', Pretendard, sans-serif; font-weight: 700;
      font-size: 0.95rem;
      color: var(--ink-3);
      cursor: pointer; touch-action: manipulation;
      transition: color .2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .hint-btn:active { color: var(--pink-d); }
    .hint-btn svg { width: 16px; height: 16px; }
    .hint-text {
      font-family: 'Jua', sans-serif;
      font-size: 1.1rem;
      color: var(--lav);
      min-height: 1.4em;
      text-align: center;
    }
    .hint-text:not(:empty) {
      background: #f1ebff;
      padding: 6px 16px 4px;
      border-radius: 999px;
    }

    /* ── Letter buttons (candy bubbles) ── */
    .letter-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 460px;
    }
    @media (min-width: 720px) {
      .letter-grid {
        gap: 14px; max-width: 580px;
      }
    }
    .letter-btn {
      aspect-ratio: 1;
      border-radius: 22px;
      border: none;
      font-family: 'Fredoka', sans-serif; font-weight: 700;
      font-size: clamp(1.6rem, 5vw, 2rem);
      color: white;
      cursor: pointer; touch-action: manipulation;
      transition: transform 0.1s, box-shadow .1s;
      user-select: none;
      position: relative;
      text-shadow: 0 1.5px 0 rgba(0,0,0,0.08);
    }
    .letter-btn::before {
      content: ''; position: absolute;
      top: 6px; left: 14%; right: 14%; height: 30%;
      border-radius: 999px;
      background: rgba(255,255,255,0.55);
      pointer-events: none;
    }
    .letter-btn:active { transform: translateY(3px); }
    .letter-btn:disabled { opacity: 0.4; }
    .letter-btn.flash-ok   { animation: flash-ok   0.5s ease; }
    .letter-btn.flash-no   { animation: flash-no   0.5s ease; }

    /* ── Word complete toast ── */
    .word-toast {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Fredoka', 'Jua', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--ink);
      background: white;
      padding: 28px 36px 24px;
      border-radius: 32px;
      pointer-events: none;
      animation: toast-in 0.45s cubic-bezier(.4,1.6,.45,.95);
      z-index: 200;
      box-shadow: 0 12px 40px -8px rgba(255, 142, 157, 0.5), 0 0 0 4px white, 0 0 0 6px var(--pink-s);
      text-align: center;
      max-width: 80vw;
    }
    .word-toast .toast-big {
      font-size: 2.6rem; display: block;
      margin-bottom: 4px;
      color: var(--pink-d);
    }
    .word-toast .toast-emoji {
      font-size: 3rem; display: block; line-height: 1; margin-bottom: 8px;
    }

    /* ═══════════════════════════════════════
       RESULT SCREEN
       ═══════════════════════════════════════ */
    .result-card {
      width: 100%;
      background: var(--paper);
      border-radius: 32px;
      box-shadow: var(--sh-card);
      padding: 36px 24px 28px;
      text-align: center;
      margin-top: 12px;
      position: relative;
    }
    .result-mascot {
      width: 180px;
      height: auto;
      object-fit: contain;
      display: block;
      margin: 0 auto;
      position: relative;
      top: -80px;
      margin-bottom: -60px;
      filter: drop-shadow(0 8px 14px rgba(200, 130, 160, 0.25));
    }
    .stars-display {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .stars-display svg { width: 52px; height: 52px; }
    .stars-display .star-on  { color: var(--butter); filter: drop-shadow(0 4px 0 #e8c454); }
    .stars-display .star-off { color: #f0e3ec; }
    .stars-display .star-on:nth-child(2) {
      width: 64px; height: 64px;
      animation: star-pop .6s ease;
    }
    @keyframes star-pop {
      0% { transform: scale(0) rotate(-20deg); }
      70% { transform: scale(1.2) rotate(8deg); }
      100% { transform: scale(1); }
    }
    .result-msg {
      font-family: 'Jua', sans-serif;
      font-size: 1.4rem; color: var(--ink);
      margin-bottom: 6px;
    }
    .result-sub {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-weight: 400; font-size: 1.05rem;
      color: var(--ink-2);
      margin-bottom: 24px;
    }
    .wrong-section { text-align: left; margin-top: 8px; }
    .wrong-header {
      font-family: 'Jua', sans-serif;
      font-size: 1rem; color: var(--ink);
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .wrong-header svg { width: 16px; height: 16px; color: var(--pink); }
    .wrong-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      background: var(--pink-x);
      border-radius: 16px;
      margin-bottom: 8px;
    }
    .wrong-item .w-emoji { font-size: 1.7rem; }
    .wrong-item .w-word  {
      font-family: 'Fredoka', sans-serif; font-weight: 700;
      font-size: 1.15rem; color: var(--pink-d);
    }
    .wrong-item .w-meaning {
      color: var(--ink-2);
      font-family: 'Pretendard Variable', Pretendard, sans-serif; font-weight: 400;
      font-size: 0.95rem;
      margin-left: auto;
    }

    .action-row {
      display: flex; gap: 12px; justify-content: center;
      flex-wrap: wrap; margin-top: 28px;
    }
    .action-btn {
      padding: 13px 24px 14px;
      border-radius: 999px; border: none;
      font-family: 'Jua', sans-serif;
      font-size: 1.05rem;
      cursor: pointer; touch-action: manipulation;
      transition: transform .1s, box-shadow .1s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .action-btn:active { transform: translateY(2px); }
    .action-btn.primary {
      background: var(--pink); color: white;
      box-shadow: 0 4px 0 0 var(--pink-d);
    }
    .action-btn.primary:active { box-shadow: 0 2px 0 0 var(--pink-d); }
    .action-btn.secondary {
      background: white; color: var(--ink-2);
      box-shadow: 0 4px 0 0 #fbd7cd, inset 0 0 0 2px #fbd7cd;
    }
    .action-btn.secondary:active { box-shadow: 0 2px 0 0 #fbd7cd, inset 0 0 0 2px #fbd7cd; }

    .email-status {
      font-family: 'Pretendard Variable', Pretendard, sans-serif; font-weight: 400;
      font-size: 0.9rem; color: var(--ink-3);
      margin-top: 16px; min-height: 1.4em;
      text-align: center;
      transition: color 0.3s;
    }
    .email-status.ok  { color: var(--mint); font-weight: 700; }
    .email-status.err { color: var(--peach); }

    /* ── Keyframes ── */
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      70%  { transform: scale(.92); }
      100% { transform: scale(1); }
    }
    @keyframes flash-ok {
      0%   { transform: scale(1); filter: brightness(1); }
      35%  { transform: scale(1.18); filter: brightness(1.15) saturate(1.3); }
      100% { transform: scale(1); filter: brightness(1); }
    }
    @keyframes flash-no {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-9px); }
      40%  { transform: translateX(9px); }
      60%  { transform: translateX(-6px); }
      80%  { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }
    @keyframes toast-in {
      0%   { transform: translate(-50%,-50%) scale(0.4) rotate(-6deg); opacity: 0; }
      65%  { transform: translate(-50%,-50%) scale(1.08) rotate(2deg); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1) rotate(0); opacity: 1; }
    }
    @keyframes mascot-wave {
      0%, 100% { transform: rotate(-4deg); }
      50%      { transform: rotate(4deg); }
    }
    .hero-mascot { animation: mascot-wave 3.5s ease-in-out infinite; transform-origin: 50% 100%; }

    /* ── Start screen actions group ── */
    .start-actions {
      width: 100%;
      display: flex; flex-direction: column;
      gap: 12px;
      margin-top: 4px;
    }
    .actions-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 2px 4px;
      color: var(--pink-s);
      user-select: none;
    }
    .actions-divider::before, .actions-divider::after {
      content: ''; flex: 1; height: 2px;
      background: repeating-linear-gradient(90deg, #f2c4b3 0 5px, transparent 5px 10px);
    }
    .actions-divider .heart {
      font-family: 'Fredoka', sans-serif;
      font-size: 1rem; color: var(--pink); letter-spacing: 2px;
    }

    /* ── 두 버튼 행 ── */
    .two-btn-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; width: 100%;
    }
    .short-btn {
      border: none; border-radius: 22px;
      padding: 14px 10px 17px;
      font-family: 'Jua', 'Fredoka', sans-serif; font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer; touch-action: manipulation;
      transition: transform .1s, box-shadow .1s;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
    }
    .short-btn:active { transform: translateY(4px); }
    .short-btn .btn-icon { font-size: 1.6rem; line-height: 1; display: block; }
    .review-shortcut {
      background: linear-gradient(180deg, #ccdaff 0%, var(--blue) 60%, #7aabee 100%);
      color: white;
      box-shadow: 0 5px 0 0 #7aabee, 0 12px 22px -8px rgba(122,171,238,0.4);
    }
    .review-shortcut:active { box-shadow: 0 1px 0 0 #7aabee; }
    .quiz-shortcut {
      background: linear-gradient(180deg, #ff9da6 0%, var(--pink) 60%, var(--pink-d) 100%);
      color: white;
      box-shadow: 0 5px 0 0 var(--pink-d), 0 12px 22px -8px rgba(237,117,137,0.45);
    }
    .quiz-shortcut:active { box-shadow: 0 1px 0 0 var(--pink-d); }

    /* ── Review open button (secondary) ── */
    .review-open-btn {
      width: 100%;
      margin-top: 0;
      background: white;
      border: none;
      border-radius: 22px;
      padding: 14px 24px;
      font-family: 'Jua', sans-serif;
      font-size: 1.1rem; color: var(--pink-d);
      cursor: pointer; touch-action: manipulation;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform .1s, box-shadow .1s;
      box-shadow: 0 4px 0 0 var(--pink-s), inset 0 0 0 2px var(--pink-s);
    }
    .review-open-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 0 var(--pink-s), inset 0 0 0 2px var(--pink-s); }
    .review-open-btn svg { width: 20px; height: 20px; }

    /* ── Quiz log (작고 눈에 안 띄는 기록 보기) ── */
    .log-peek-btn {
      display: block; margin: 14px auto 2px;
      background: none; border: none;
      font-family: 'Jua', sans-serif; font-size: 0.66rem;
      letter-spacing: 1px; color: var(--ink-3); opacity: 0.35;
      padding: 6px 12px; cursor: pointer; touch-action: manipulation;
    }
    .log-peek-btn:active { opacity: 0.75; }
    .log-wrap { width: 100%; padding: 6px 2px 28px; overflow-y: auto; }
    .log-section-title {
      font-family: 'Jua', sans-serif; font-size: 0.92rem;
      color: var(--pink-d); margin: 16px 4px 8px;
    }
    .log-missed { display: flex; flex-direction: column; gap: 5px; }
    .log-miss-item {
      display: flex; align-items: center; gap: 8px;
      background: #fff5f8; border: 1.5px solid #ffe0ea;
      border-radius: 12px; padding: 7px 12px;
    }
    .log-miss-n {
      font-family: 'Jua', sans-serif; font-size: 0.72rem; color: #fff;
      background: var(--pink); border-radius: 8px; padding: 2px 7px; flex-shrink: 0;
    }
    .log-miss-label { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 0.95rem; color: var(--ink-2); }
    .log-miss-sub { font-size: 0.8rem; color: var(--ink-3); margin-left: auto; text-align: right; }
    .log-sessions { display: flex; flex-direction: column; gap: 6px; }
    .log-sess { background: #fafafe; border: 1.5px solid #efefef; border-radius: 12px; padding: 8px 12px; }
    .log-sess-head { display: flex; align-items: center; gap: 8px; font-family: 'Jua', sans-serif; font-size: 0.76rem; }
    .log-sess-date { color: var(--ink-3); }
    .log-sess-mode { color: var(--lav); }
    .log-sess-score { margin-left: auto; color: var(--pink-d); }
    .log-sess-wrong { font-size: 0.78rem; color: var(--ink-3); margin-top: 3px; word-break: break-word; }
    .log-empty { color: var(--ink-3); font-size: 0.85rem; text-align: center; padding: 16px; }
    .log-clear-btn {
      display: block; margin: 20px auto 0;
      background: none; border: 1.5px solid #eee; color: var(--ink-3);
      font-family: 'Jua', sans-serif; font-size: 0.72rem;
      border-radius: 10px; padding: 8px 16px; cursor: pointer; opacity: 0.7;
    }

    /* ── Weekly record strip ── */
    .weekly-strip {
      width: 100%;
      background: var(--paper);
      border-radius: 24px;
      box-shadow: var(--sh-card);
      padding: 18px 18px 22px;
      margin-bottom: 22px;
      position: relative;
      overflow: hidden;
    }
    .weekly-strip::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 6px;
      background: repeating-linear-gradient(90deg, var(--pink) 0 14px, transparent 14px 22px);
      opacity: 0.45;
    }
    .weekly-strip-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
      margin-top: 4px;
    }
    .weekly-strip-title {
      font-family: 'Jua', sans-serif;
      font-size: 1rem; color: var(--ink);
      display: inline-flex; align-items: center; gap: 6px;
      white-space: nowrap; word-break: keep-all;
    }
    .weekly-strip-title svg { width: 16px; height: 16px; color: var(--pink); flex: 0 0 auto; }
    .weekly-strip-streak {
      font-family: 'Jua', sans-serif;
      font-size: 0.85rem; color: var(--pink-d);
      background: var(--pink-x);
      padding: 4px 11px 3px;
      border-radius: 999px;
      white-space: nowrap; word-break: keep-all;
      box-shadow: inset 0 0 0 1.5px #f8c2b3;
    }
    .day-row {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
    }
    .day-cell {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 6px 0 4px;
      border-radius: 14px;
      position: relative;
      min-width: 0;
    }
    .day-cell.is-today {
      background: linear-gradient(180deg, #fff3ec 0%, #ffe4d8 100%);
      box-shadow: inset 0 0 0 1.5px #ffd3d3;
    }
    .day-label {
      font-family: 'Jua', sans-serif;
      font-size: 0.78rem; color: var(--ink-3);
      line-height: 1;
    }
    .day-label.today { color: var(--pink-d); }
    /* 두 개 점 열 (수직) */
    .day-dots-row {
      display: flex; flex-direction: column; gap: 3px; align-items: center; justify-content: center;
    }
    .day-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #f8ebe2;
      border: 2px solid #e5d2c5;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem;
      transition: transform .2s;
      box-shadow: inset 0 -2px 0 0 rgba(0,0,0,0.03);
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .day-dot .dot-label { display: none; }
    .day-dot.done {
      background: linear-gradient(160deg, #ffc1b3 0%, var(--pink) 100%);
      border-color: var(--pink-d);
      box-shadow: 0 3px 0 0 var(--pink-d), inset 0 2px 0 0 rgba(255,255,255,0.35);
      color: white;
    }
    .day-dot.review-done {
      background: linear-gradient(160deg, #c8d8ff 0%, var(--blue) 100%);
      border-color: #7aabee;
      box-shadow: 0 3px 0 0 #7aabee, inset 0 2px 0 0 rgba(255,255,255,0.35);
      color: white;
    }
    .day-dot.today-empty {
      border-color: var(--pink);
      border-style: dashed;
      background: white;
      color: var(--pink);
    }
    .day-dot.is-future { opacity: 0.35; }
    .day-dot.done, .day-dot.review-done { animation: dot-pop .4s cubic-bezier(.5,1.6,.45,.9); }
    @keyframes dot-pop {
      0%   { transform: scale(0.6); }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .day-bottom {
      min-height: 0;
      margin-top: 4px;
    }
    .day-stars {
      font-family: 'Jua', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0px;
      line-height: 1;
      color: var(--pink-d);
    }
    .day-stars .off { color: #e5d0c3; }
    .day-stars.today-label { color: var(--pink-d); font-size: 0.65rem; }
    @media (max-width: 380px) {
      .weekly-strip { padding: 14px 10px 18px; }
      .day-row { gap: 2px; }
      .day-dot { width: 19px; height: 19px; font-size: 0.65rem; }
      .day-label { font-size: 0.68rem; }
    }
    @media (min-width: 720px) {
      .day-dot { width: 28px; height: 28px; font-size: 0.9rem; }
      .day-label { font-size: 0.88rem; }
      .day-stars { font-size: 0.75rem; }
    }

    /* ═══════════════════════════════════════
       CONVERSATION GAME (대답 고르기)
       ═══════════════════════════════════════ */
    .conv-shortcut-btn {
      width: 100%;
      border: none; border-radius: 22px;
      padding: 14px 20px 17px;
      font-family: 'Jua', 'Fredoka', sans-serif; font-weight: 700;
      font-size: 1.15rem;
      cursor: pointer; touch-action: manipulation;
      transition: transform .1s, box-shadow .1s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      background: linear-gradient(180deg, #ddd2ff 0%, var(--lav) 60%, #9b89d8 100%);
      color: white;
      box-shadow: 0 5px 0 0 #9b89d8, 0 12px 22px -8px rgba(155,137,216,0.4);
    }
    .conv-shortcut-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 0 #9b89d8; }
    .conv-shortcut-btn .btn-icon { font-size: 1.5rem; }

    .conv-question-card {
      position: relative;
      width: 100%;
      background: var(--paper);
      border-radius: 32px;
      box-shadow: var(--sh-card);
      padding: 42px 24px 28px;
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 20px;
      text-align: center;
    }
    .conv-question-card::before {
      content: ''; position: absolute; top: 14px; left: 14px; right: 14px; bottom: 14px;
      border-radius: 22px;
      border: 2px dashed #e8d8ff;
      pointer-events: none; opacity: 0.6;
    }
    .conv-tag {
      position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
      background: var(--lav); color: white;
      font-family: 'Jua', sans-serif; font-size: 0.85rem;
      padding: 4px 16px 3px; border-radius: 999px;
      box-shadow: 0 3px 0 0 #9b89d8;
      white-space: nowrap;
      display: flex; align-items: center; gap: 5px;
    }
    .conv-tag svg { width: 13px; height: 13px; }
    .conv-question-text {
      font-family: 'Fredoka', 'Jua', sans-serif;
      font-weight: 600;
      font-size: clamp(1.35rem, 5vw, 1.75rem);
      color: var(--ink); line-height: 1.35;
      margin: 10px 0 20px; z-index: 2;
    }

    .conv-question-card .speak-btn {
      margin-bottom: 38px;
    }

    .conv-choices {
      display: flex; flex-direction: column; gap: 10px; width: 100%;
      margin-top: 8px;
    }
    .conv-choice-btn {
      display: flex; align-items: center; gap: 10px;
      background: var(--paper);
      border-radius: 20px;
      border: 2.5px solid var(--line);
      padding: 13px 14px;
      cursor: pointer; touch-action: manipulation;
      transition: transform .12s, box-shadow .12s, background .15s, border-color .15s;
      box-shadow: 0 4px 0 0 #f0d8cf;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .conv-choice-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 0 #f0d8cf; }
    .conv-choice-btn.conv-correct {
      background: linear-gradient(180deg, #e8fff5 0%, #cffaeb 100%);
      border-color: var(--mint); box-shadow: 0 4px 0 0 #6abf9a;
    }
    .conv-choice-btn.conv-wrong {
      background: linear-gradient(180deg, #ffe0e5 0%, #ffc8d0 100%);
      border-color: var(--pink); box-shadow: 0 4px 0 0 var(--pink-d);
    }
    .conv-choice-btn.conv-correct .choice-text { color: #2a7a5a; }
    .conv-choice-btn.conv-wrong   .choice-text { color: var(--pink-d); }
    .choice-num {
      flex: 0 0 auto;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--pink-s);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Jua', sans-serif; font-size: 0.85rem; color: var(--pink-d);
    }
    .conv-choice-btn.conv-correct .choice-num { background: var(--mint); color: white; }
    .conv-choice-btn.conv-wrong   .choice-num { background: var(--pink); color: white; }
    .choice-text-group { flex: 1; display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .choice-text {
      font-family: 'Fredoka', sans-serif; font-weight: 600;
      font-size: 1.08rem; color: var(--ink); line-height: 1.3; text-align: left;
    }
    .choice-korean {
      display: none;
      font-family: 'Jua', sans-serif; font-size: 0.82rem;
      color: var(--lav); line-height: 1.2;
    }
    .conv-choice-row {
      display: flex; align-items: center; gap: 22px; width: 100%;
    }
    .conv-choice-row .conv-choice-btn { flex: 1; min-width: 0; }
    .choice-speak-btn {
      flex: 0 0 auto;
      width: 34px; height: 34px; border-radius: 50%;
      background: white; border: none;
      cursor: pointer; touch-action: manipulation;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 0 0 var(--pink-s), inset 0 0 0 1.5px var(--pink-s);
      transition: transform .1s; color: var(--pink-d);
    }
    .choice-speak-btn:active { transform: scale(0.88); }
    .choice-speak-btn svg { width: 15px; height: 15px; }

    .day-dot.conv-done {
      background: linear-gradient(160deg, #d8c8ff 0%, var(--lav) 100%);
      border-color: #9b89d8;
      box-shadow: 0 3px 0 0 #9b89d8, inset 0 2px 0 0 rgba(255,255,255,0.35);
      color: white;
    }
    .conv-korean-hint {
      display: none;
      font-family: 'Jua', sans-serif; font-size: 1rem;
      color: var(--lav);
      background: #f1ebff; padding: 6px 18px 5px; border-radius: 999px;
      margin-bottom: 4px; z-index: 2;
    }
    .conv-korean-btn {
      background: transparent; border: none;
      padding: 5px 14px;
      font-family: 'Pretendard Variable', Pretendard, sans-serif; font-weight: 700;
      font-size: 0.88rem; color: var(--ink-3);
      cursor: pointer; touch-action: manipulation;
      transition: color .2s;
      display: inline-flex; align-items: center; gap: 5px; z-index: 2;
    }
    .conv-korean-btn:active { color: var(--lav); }

    /* ── Bun Bun chat layout ── */
    .conv-chat-area {
      width: 100%;
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 16px;
    }
    .conv-bunny-char {
      width: 110px; height: auto;
      filter: drop-shadow(0 6px 14px rgba(200,130,160,0.3));
      animation: mascot-wave 3.5s ease-in-out infinite;
      transform-origin: 50% 100%;
      position: relative; z-index: 2;
      margin-bottom: -4px;
    }
    .conv-speech-bubble {
      position: relative;
      width: 100%;
      background: white;
      border-radius: 28px;
      padding: 22px 22px 18px;
      box-shadow: var(--sh-card);
      text-align: center;
      display: flex; flex-direction: column; align-items: center;
    }
    .conv-speech-bubble::before {
      content: '';
      position: absolute; top: -13px; left: 50%; transform: translateX(-50%);
      border-left: 11px solid transparent;
      border-right: 11px solid transparent;
      border-bottom: 15px solid white;
    }
    .conv-bun-name {
      font-family: 'Fredoka', 'Jua', sans-serif; font-weight: 700;
      font-size: 0.95rem; color: var(--pink-d);
      background: var(--pink-x); padding: 3px 14px 2px; border-radius: 999px;
      margin-bottom: 10px;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .conv-bubble-actions {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      margin-top: 6px;
    }

    /* ── Voice Test Modal ── */
    .vt-btn {
      display: block; margin: 0 auto;
      background: none; border: 1.5px dashed #ccc; border-radius: 20px;
      color: #888; font-size: 0.85rem; cursor: pointer;
      padding: 7px 18px; letter-spacing: 0.02em;
    }
    .vt-btn:hover { color: var(--lav-d); border-color: var(--lav); }
    .vt-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 9000; display: flex; align-items: center; justify-content: center;
    }
    .vt-modal {
      background: white; border-radius: 28px;
      padding: 26px 20px 20px; width: min(94%, 390px);
      max-height: 82vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .vt-title { font-family: 'Fredoka','Jua',sans-serif; font-size: 1.2rem; font-weight: 700; color: var(--pink-d); text-align: center; margin-bottom: 2px; }
    .vt-subtitle { font-size: 0.78rem; color: #999; text-align: center; margin-bottom: 16px; }
    .vt-grid { display: flex; flex-direction: column; gap: 9px; }
    .vt-card {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg); border-radius: 16px; padding: 11px 13px;
      border: 2px solid transparent; transition: .15s;
    }
    .vt-card.vt-playing { border-color: var(--pink); background: var(--pink-x); }
    .vt-card.vt-current-preset { border-color: var(--lav); }
    .vt-num { font-family: 'Fredoka',sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--lav-d); min-width: 26px; text-align: center; }
    .vt-info { flex: 1; }
    .vt-label { font-weight: 700; font-size: 0.88rem; color: #333; }
    .vt-params { font-size: 0.72rem; color: #aaa; margin-top: 1px; }
    .vt-play {
      background: var(--lav); color: white; border: none; border-radius: 50%;
      width: 34px; height: 34px; font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      transition: .12s;
    }
    .vt-play:active { transform: scale(0.9); }
    .vt-section-title {
      font-family: 'Fredoka','Jua',sans-serif; font-weight: 700;
      font-size: 0.82rem; color: #aaa; letter-spacing: 0.05em;
      text-transform: uppercase; margin: 14px 0 8px 2px;
    }
    .vt-close-btn {
      display: block; margin: 16px auto 0;
      background: var(--pink); color: white; border: none;
      border-radius: 20px; padding: 10px 36px;
      font-family: 'Fredoka','Jua',sans-serif; font-weight: 700; font-size: 1rem;
      cursor: pointer;
    }

    /* ── Flash Card Game ── */
    .flash-shortcut {
      background: linear-gradient(180deg, #bbe8d8 0%, var(--mint) 60%, #6abf9a 100%);
      color: white;
      box-shadow: 0 5px 0 0 #6abf9a, 0 12px 22px -8px rgba(106,191,154,0.4);
      grid-column: 1 / -1;
    }
    .flash-shortcut:active { box-shadow: 0 1px 0 0 #6abf9a; }
    .fc-card {
      position: relative; width: 100%; max-width: 480px;
      background: var(--paper); border-radius: 32px;
      box-shadow: var(--sh-card);
      padding: 40px 24px 32px;
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 20px; text-align: center;
    }
    .fc-card::before {
      content: ''; position: absolute; top: 14px; left: 14px; right: 14px; bottom: 14px;
      border-radius: 22px; border: 2px dashed #ffd3d3;
      pointer-events: none; opacity: 0.5;
    }
    .fc-tag {
      position: absolute; top: -13px; left: 50%; transform: translateX(-50%);
      background: var(--pink); color: white;
      font-family: 'Jua', sans-serif; font-size: 0.85rem;
      padding: 4px 18px 3px; border-radius: 999px;
      box-shadow: 0 3px 0 0 var(--pink-d);
      white-space: nowrap; display: flex; align-items: center; gap: 6px;
    }
    .fc-word {
      font-family: 'Fredoka', sans-serif; font-weight: 700;
      font-size: clamp(2.2rem, 8vw, 3rem);
      color: var(--ink); letter-spacing: 1px; margin-bottom: 6px;
    }
    .fc-pron {
      font-family: 'Pretendard Variable', Pretendard, sans-serif; font-weight: 400;
      font-size: 1rem; color: var(--ink-3); margin-bottom: 18px;
    }
    .fc-sound-btn {
      background: white; border: none; border-radius: 999px;
      padding: 10px 26px 9px;
      font-family: 'Jua', sans-serif; font-size: 1.05rem; color: var(--pink-d);
      cursor: pointer; touch-action: manipulation;
      box-shadow: 0 3px 0 0 var(--pink-s), inset 0 0 0 2px var(--pink-s);
      display: inline-flex; align-items: center; gap: 8px;
    }
    .fc-sound-btn:active { transform: translateY(2px); }
    .fc-sound-btn svg { width: 18px; height: 18px; }
    .fc-answer-panel {
      display: none; width: 100%; margin-top: 18px;
      background: linear-gradient(180deg, #e8fff5 0%, #cffaeb 100%);
      border: 2px solid var(--mint); border-radius: 20px;
      padding: 16px 18px 14px; text-align: center;
      animation: fc-panel-in 0.35s cubic-bezier(.4,1.5,.45,.95);
    }
    .fc-answer-panel.visible { display: block; }
    @keyframes fc-panel-in {
      0%   { transform: scaleY(0.4); opacity: 0; transform-origin: top; }
      100% { transform: scaleY(1);   opacity: 1; transform-origin: top; }
    }
    .fc-ap-label { font-family: 'Jua', sans-serif; font-size: 0.85rem; color: #2a7a5a; margin-bottom: 8px; }
    .fc-ap-emoji { font-size: 2.4rem; line-height: 1; display: block; margin-bottom: 4px; }
    .fc-ap-word  { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 2rem; color: #2a7a5a; }
    .fc-ap-pron  { font-family: 'Pretendard Variable', Pretendard, sans-serif; font-weight: 400; font-size: 0.95rem; color: #5aaa88; margin-bottom: 10px; }
    .fc-ap-snd {
      background: white; border: none; border-radius: 999px;
      padding: 7px 20px 6px; font-family: 'Jua', sans-serif; font-size: 0.95rem; color: #2a7a5a;
      cursor: pointer; touch-action: manipulation;
      box-shadow: 0 3px 0 0 #96d8bf, inset 0 0 0 1.5px #96d8bf;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .fc-ap-snd svg { width: 16px; height: 16px; }
    .fc-choices {
      width: 100%; max-width: 480px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .fc-choice-btn {
      background: var(--paper); border: 2.5px solid #f5d8d0; border-radius: 22px;
      padding: 18px 12px 17px;
      font-family: 'Jua', sans-serif; font-size: 1.05rem; color: var(--ink);
      cursor: pointer; touch-action: manipulation;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      box-shadow: 0 4px 0 0 #f0d8cf;
      transition: transform .1s, box-shadow .1s; user-select: none;
    }
    .fc-choice-btn .fc-num { font-size: 0.75rem; color: var(--ink-3); font-family: 'Pretendard Variable', Pretendard, sans-serif; }
    .fc-choice-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 0 #f0d8cf; }
    .fc-choice-btn.correct { background: linear-gradient(180deg,#e8fff5 0%,#cffaeb 100%); border-color: var(--mint); box-shadow: 0 4px 0 0 #6abf9a; color: #2a7a5a; }
    .fc-choice-btn.wrong   { background: linear-gradient(180deg,#ffe0e5 0%,#ffc8d0 100%); border-color: var(--pink); box-shadow: 0 4px 0 0 var(--pink-d); color: var(--pink-d); }
    @keyframes fc-shake {
      0%,100% { transform:translateX(0) translateY(2px); }
      20%     { transform:translateX(-8px) translateY(2px); }
      40%     { transform:translateX(8px) translateY(2px); }
      60%     { transform:translateX(-5px) translateY(2px); }
      80%     { transform:translateX(5px) translateY(2px); }
    }
    .fc-choice-btn.fc-shake { animation: fc-shake 0.4s ease; }
  </style>
</head>
<body>

  <!-- ═══ Decorative background ═══ -->
  <div class="deco" aria-hidden="true">

    <svg class="d2" viewBox="0 0 40 40"><path d="M20 36 L7 23 a8 8 0 0 1 13-10 a8 8 0 0 1 13 10 Z" fill="#ff9da6"/></svg>

    <svg class="d4" viewBox="0 0 40 40"><path d="M20 4 L24 16 L36 18 L26 26 L29 38 L20 32 L11 38 L14 26 L4 18 L16 16 Z" fill="#c8b9f5"/></svg>
    <svg class="d5" viewBox="0 0 40 40"><path d="M20 36 L7 23 a8 8 0 0 1 13-10 a8 8 0 0 1 13 10 Z" fill="#a8caff"/></svg>
    <svg class="d6" viewBox="0 0 40 40"><circle cx="14" cy="22" r="10" fill="#fff"/><circle cx="26" cy="22" r="10" fill="#fff"/><circle cx="20" cy="16" r="10" fill="#fff"/></svg>

  </div>

  <div class="stage">

  <!-- ═══ START SCREEN ═══ -->
  <div class="screen" id="screen-start">
    <div class="hero">
      <div class="hero-text">
        <span class="hero-eyebrow">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.9l-6.2 4.4 2.4-7.4L2 9.4h7.6z"/></svg>
          오늘의 영어 놀이
        </span>
        <div class="hero-title">
          <span class="ally">Ally</span>'s<br>
          English<br>
          Game <span class="sparkle">✦</span>
        </div>

      </div>
      <img class="hero-mascot" src="assets/bunny.png?v=1778935397334" alt="bunny mascot">
    </div>

    <div class="weekly-strip" id="weeklyStrip"></div>

    <div class="section-label" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
      난이도 골라봐!
    </div>
    <div class="difficulty-row" style="display:none">
      <button class="diff-btn selected" id="diff-very-easy" data-d="very-easy" onclick="selectDiff('very-easy')">
        <span class="d-face">🌸</span>
        <span class="d-name">아주쉬움</span>
        <span class="d-hint">반반 보여줘</span>
      </button>
      <button class="diff-btn" id="diff-easy" data-d="easy" onclick="selectDiff('easy')">
        <span class="d-face">🌱</span>
        <span class="d-name">쉬움</span>
        <span class="d-hint">첫 글자만</span>
      </button>
      <button class="diff-btn" id="diff-hard" data-d="hard" onclick="selectDiff('hard')">
        <span class="d-face">🔥</span>
        <span class="d-name">어려움</span>
        <span class="d-hint">다 스스로!</span>
      </button>
    </div>

    <div class="start-actions">
      <div class="two-btn-row">
        <button class="short-btn review-shortcut" onclick="startThisWeekReview()">
          <span class="btn-icon">📖</span>
          이번 주 복습
        </button>
        <button class="short-btn quiz-shortcut" onclick="startGame()">
          <span class="btn-icon">⭐</span>
          오늘의 퀴즈
        </button>
      </div>

      <div class="two-btn-row">
        <button class="short-btn review-shortcut" style="background:linear-gradient(180deg,#ddd2ff 0%,var(--lav) 60%,#9b89d8 100%);box-shadow:0 5px 0 0 #9b89d8,0 12px 22px -8px rgba(155,137,216,0.4)" onclick="startConvReview()">
          <span class="btn-icon">💬</span>
          대화 복습
        </button>
        <button class="short-btn quiz-shortcut" style="background:linear-gradient(180deg,#ddd2ff 0%,var(--lav) 60%,#9b89d8 100%);box-shadow:0 5px 0 0 #9b89d8,0 12px 22px -8px rgba(155,137,216,0.4)" onclick="startConvQuiz()">
          <span class="btn-icon">🗣️</span>
          대화 퀴즈
        </button>
      </div>

      <div class="actions-divider" aria-hidden="true"><span class="heart">♡ ♡ ♡</span></div>

      <button class="review-open-btn" onclick="goReview()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 012-2h11v18H6a2 2 0 01-2-2V5z"/><path d="M9 7h6M9 11h6"/></svg>
        복습하기
      </button>
      <button class="vt-btn" onclick="openVoiceTest()" style="display:none">🎙️ 목소리 테스트</button>
    </div>
    <button class="log-peek-btn" onclick="openQuizLog()" aria-label="퀴즈 기록 보기">· 기록 ·</button>
  </div>

  <!-- ═══ REVIEW SELECT SCREEN ═══ -->
  <div class="screen" id="screen-review">
    <div class="top-bar">
      <button class="home-btn" onclick="goStart()" aria-label="처음으로">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="screen-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 012-2h11v18H6a2 2 0 01-2-2V5z"/><path d="M9 7h6M9 11h6"/></svg>
        복습하기
      </div>
      <div style="width:38px"></div>
    </div>

    <div class="section-label" style="margin-top:4px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 012-2h11v18H6a2 2 0 01-2-2V5z"/><path d="M9 7h6M9 11h6"/></svg>
      몇 주차 복습할까?
    </div>
    <div class="review-list visible" id="reviewList"></div>

    <div class="section-label" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
      난이도 골라봐!
    </div>
    <div class="difficulty-row" style="display:none">
      <button class="diff-btn selected" id="rdiff-very-easy" data-d="very-easy" onclick="selectDiff('very-easy','r')">
        <span class="d-face">🌸</span>
        <span class="d-name">아주쉬움</span>
        <span class="d-hint">반반 보여줘</span>
      </button>
      <button class="diff-btn" id="rdiff-easy" data-d="easy" onclick="selectDiff('easy','r')">
        <span class="d-face">🌱</span>
        <span class="d-name">쉬움</span>
        <span class="d-hint">첫 글자만</span>
      </button>
      <button class="diff-btn" id="rdiff-hard" data-d="hard" onclick="selectDiff('hard','r')">
        <span class="d-face">🔥</span>
        <span class="d-name">어려움</span>
        <span class="d-hint">다 스스로!</span>
      </button>
    </div>

    <button class="start-btn" onclick="startReviewGame()">Let's Review!</button>
  </div>
  <!-- ═══ GAME SCREEN ═══ -->
  <div class="screen" id="screen-game">
    <div class="top-bar">
      <button class="home-btn" onclick="goStart()" aria-label="처음으로">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 4l9 8"/><path d="M5 10v10h14V10"/></svg>

        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressLabel">1 / 10</div>

    <div class="game-card">
      <div class="game-card-tag">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.9l-6.2 4.4 2.4-7.4L2 9.4h7.6z"/></svg>

      </div>
      <div class="emoji-area" id="emojiArea"></div>
      <button class="speak-btn" onclick="speakCurrent()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H3v6h3l5 4z"/><path d="M16 9a4 4 0 010 6"/><path d="M19 6a8 8 0 010 12"/></svg>

    <div class="letter-grid" id="letterGrid"></div>

    <div class="result-card">
      <img class="result-mascot" src="assets/bunny.png?v=1778935397334" alt="bunny celebration">

        </button>
        <button class="action-btn secondary" onclick="goStart()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 4l9 8"/><path d="M5 10v10h14V10"/></svg>

      <div class="email-status" id="emailStatus"></div>
    </div>

  <!-- ═══ CONVERSATION GAME SCREEN ═══ -->
  <div class="screen" id="screen-conv">
    <div class="top-bar">
      <button class="home-btn" onclick="goStart()" aria-label="처음으로">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12L12 4l9 8"/><path d="M5 10v10h14V10"/></svg>
      </button>
      <div class="progress-track">
        <div class="progress-fill" id="convProgressFill"></div>
      </div>
      <div class="progress-label" id="convProgressLabel">1 / 2</div>
    </div>

    <div class="conv-question-card">
      <div class="conv-tag">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
        어떻게 대답할까?
      </div>
      <div class="conv-question-text" id="convQuestionText"></div>

<script>
emailjs.init({ publicKey: 'SmEGPotCOv7j_TAqw' });

/* Candy palette for letter buttons */
const BTN_COLORS = [
  '#ff9da6', // candy pink
  '#a8caff', // baby blue
  '#9adfc4', // mint
  '#c8b9f5', // lavender
  '#ffba7a', // peach
  '#ffd66e', // butter
  '#ff8e9d', // hot pink
  '#88c7f5', // sky
  '#ffb1d4', // rose
  '#bce0a5', // pistachio
  '#f5a8c8', // bubblegum
  '#a3d8f5', // cyan
];

let currentMode = 'main';

const TODAY_QUIZ_TOTAL = 10;
const TODAY_QUIZ_CURRENT_TARGET = 3;
const TODAY_QUIZ_PREV_TARGET = 7;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  document.getElementById(id).style.display = 'flex';
}
function getGameEmoji(w) {
  if (w.svgEmoji) {
    return `<svg width="124" height="86" viewBox="0 0 124 86" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle">
      <rect width="124" height="86" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
      <circle cx="62" cy="43" r="26" fill="#bc002d"/>

  }
  return `<span>${w.emoji}</span>`;
}

function goReview() {
  currentMode = 'review';
  buildReviewList();
  // 복습 화면 난이도 버튼 동기화
  ['very-easy','easy','hard'].forEach(k => document.getElementById('rdiff-' + k).classList.toggle('selected', k === difficulty));
  showScreen('screen-review');
}
function buildReviewList() {
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  const latestKey = WEEK_ORDER[WEEK_ORDER.length - 1];
  [...WEEK_ORDER].reverse().forEach((key) => {
    const item = document.createElement('div');
    item.className = 'review-item' + (key === selectedReview ? ' selected' : '');
    const isLatest = key === latestKey;
    const num = WEEK_ORDER.indexOf(key) + 1;
    item.innerHTML = `
      <span class="ri-dot">${num}</span>
      <span class="ri-label">${WORDS_DATA[key].label}${isLatest ? '<span class="badge">NEW</span>' : ''}</span>
      <span class="ri-count">${WORDS_DATA[key].words.length} words</span>
    `;
    item.onclick = () => {
      selectedReview = key;
      document.querySelectorAll('.review-item').forEach(i => i.classList.remove('selected'));
      item.classList.add('selected');
    };
    list.appendChild(item);
  });
}
function selectDiff(d, prefix) {
  difficulty = d;
  const p = prefix === 'r' ? 'rdiff-' : 'diff-';
  ['very-easy','easy','hard'].forEach(k => {
    const el = document.getElementById(p + k); if (el) el.classList.toggle('selected', k === d);
  });
}
function startReviewGame() { gameWords = shuffle([...WORDS_DATA[selectedReview].words]); currentIdx = 0; wrongWords = []; showScreen('screen-game'); loadWord(); }
/* ── Weekly record (localStorage) ── */
const STORAGE_KEY = 'ally_game_records';
function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function saveRecord(stars, correct, total, mode) {
  const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  const key = getTodayKey();
  if (!records[key]) records[key] = {};
  const prev = records[key][mode];
  // 별이 더 많은 것만 덮어씀
  if (!prev || stars > prev.stars) {
    records[key][mode] = { stars, correct, total, ts: Date.now() };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }
}

/* ── 퀴즈 결과 로그 (브라우저 localStorage, 틀린 단어 집계용) ── */
const QUIZ_LOG_KEY = 'ally_quiz_log';
const QUIZ_LOG_MAX = 300;
const QUIZ_MODE_LABELS = { main: '단어 퀴즈', review: '단어 복습', flash: '단어 퀴즈', convReview: '대화 복습', convQuiz: '대화 퀴즈' };
function readQuizLog() { try { return JSON.parse(localStorage.getItem(QUIZ_LOG_KEY) || '[]'); } catch (e) { return []; } }
function logQuizResult(mode, correct, total, stars, wrong) {
  let log = readQuizLog();
  log.push({ ts: Date.now(), mode, correct, total, stars, wrong: (wrong || []).map(w => ({ label: w.label, sub: w.sub || '' })) });
  if (log.length > QUIZ_LOG_MAX) log = log.slice(log.length - QUIZ_LOG_MAX);
  localStorage.setItem(QUIZ_LOG_KEY, JSON.stringify(log));
}
function openQuizLog() { buildQuizLog(); showScreen('screen-log'); }
function buildQuizLog() {
  const log = readQuizLog();
  // 자주 틀린 단어/표현 집계
  const counts = {};
  log.forEach(e => (e.wrong || []).forEach(w => {
    if (!counts[w.label]) counts[w.label] = { label: w.label, sub: w.sub, n: 0 };
    counts[w.label].n++;
  }));
  const ranked = Object.values(counts).sort((a, b) => b.n - a.n);
  const missEl = document.getElementById('logMissed');
  missEl.innerHTML = ranked.length === 0
    ? '<div class="log-empty">아직 틀린 기록이 없어요 🎉</div>'
    : ranked.map(r => `<div class="log-miss-item"><span class="log-miss-n">${r.n}회</span><span class="log-miss-label">${r.label}</span><span class="log-miss-sub">${r.sub || ''}</span></div>`).join('');
  // 최근 기록 (최신순)
  const sessEl = document.getElementById('logSessions');
  sessEl.innerHTML = log.length === 0
    ? '<div class="log-empty">아직 푼 퀴즈가 없어요</div>'
    : [...log].reverse().map(e => {
        const d = new Date(e.ts);
        const dateStr = `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        const modeLabel = QUIZ_MODE_LABELS[e.mode] || e.mode;
        const wrongStr = (e.wrong && e.wrong.length) ? e.wrong.map(w => w.label).join(', ') : '없음 🎉';
        return `<div class="log-sess">
          <div class="log-sess-head"><span class="log-sess-date">${dateStr}</span><span class="log-sess-mode">${modeLabel}</span><span class="log-sess-score">${e.correct}/${e.total} ${'★'.repeat(e.stars)}</span></div>
          <div class="log-sess-wrong">✗ ${wrongStr}</div>
        </div>`;
      }).join('');
  document.getElementById('logCount').textContent = log.length;
}
function clearQuizLog() {
  if (!confirm('퀴즈 기록을 모두 지울까요?\n(주간 별점·스탬프는 그대로 유지돼요)')) return;
  localStorage.removeItem(QUIZ_LOG_KEY);
  buildQuizLog();
}
function buildWeeklyStrip() {
  const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  const today = new Date();
  const todayKey = getTodayKey();
  const dow = today.getDay();
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(today);
  monday.setDate(today.getDate() + mondayOffset);
  const DAY_LABELS = ['월','화','수','목','금','토','일'];
  // 연속 스트릭: main 또는 review 둘 다 완료한 날 기준
  let streak = 0;
  for (let i = 0; i < 30; i++) {
    const d = new Date(today); d.setDate(today.getDate() - i);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const r = records[k];
    if (r && (r.main || r.review || r.conv || r.convReview || r.convQuiz)) streak++; else break;
  }
  let cells = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const isToday = key === todayKey;
    const rec = records[key] || {};
    const isFuture = d > today && !isToday;
    // 카테고리: 단어복습 / 단어퀴즈 / 대화복습 / 대화퀴즈 (legacy 'conv'는 대화퀴즈로 표시)
    const cats = [
      { rec: rec.review,                   cls: 'review-done', emoji: '📖', color: 'var(--blue)'   },
      { rec: rec.main,                     cls: 'done',        emoji: '⭐', color: 'var(--pink-d)' },
      { rec: rec.convReview,               cls: 'conv-done',   emoji: '💬', color: 'var(--lav)'    },
      { rec: rec.convQuiz || rec.conv,     cls: 'conv-done',   emoji: '🗣️', color: 'var(--lav)'    },
    ];
    let dotsHtml = '', starsHtml = '';
    cats.forEach(c => {
      const done = !!c.rec;
      const cls = 'day-dot' + (done ? ' ' + c.cls : (isToday ? ' today-empty' : (isFuture ? ' is-future' : '')));
      const emoji = done ? c.emoji : (isToday && !isFuture ? '♡' : '');
      dotsHtml += `<div class="${cls}">${emoji}</div>`;
      if (done) {
        const s = c.rec.stars;
        starsHtml += `<div class="day-stars" style="color:${c.color}">${'★'.repeat(s)}<span class="off">${'★'.repeat(3-s)}</span></div>`;
      }
    });
    cells += `<div class="day-cell${isToday ? ' is-today' : ''}">
      <span class="day-label${isToday ? ' today' : ''}">${DAY_LABELS[i]}</span>
      <div class="day-dots-row">${dotsHtml}</div>
      <div class="day-bottom">${starsHtml}</div>
    </div>`;
  }
  const streakBadge = streak > 1 ? `<span class="weekly-strip-streak">🔥 ${streak}일 연속!</span>` : '';
  document.getElementById('weeklyStrip').innerHTML = `
    <div class="weekly-strip-header">
      <span class="weekly-strip-title">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.9l-6.2 4.4 2.4-7.4L2 9.4h7.6z"/></svg>
        이번 주 기록
      </span>
      ${streakBadge}
    </div>
    <div class="day-row">${cells}</div>
  `;
}
function initStart() { currentMode = 'main'; buildWeeklyStrip(); showScreen('screen-start'); }

function buildGameWords() {
  if (currentMode === 'review') return shuffle([...WORDS_DATA[selectedReview].words]);
  const lk = WEEK_ORDER[WEEK_ORDER.length - 1], cur = shuffle([...WORDS_DATA[lk].words]), prev = [];
  WEEK_ORDER.slice(0, -1).forEach(k => prev.push(...WORDS_DATA[k].words));
  const sp = shuffle(prev);
  if (prev.length === 0) return cur.slice(0, Math.min(TODAY_QUIZ_TOTAL, cur.length));
  const tc = Math.min(TODAY_QUIZ_CURRENT_TARGET, cur.length), tp = Math.min(TODAY_QUIZ_PREV_TARGET, sp.length);
  let sel = [...cur.slice(0, tc), ...sp.slice(0, tp)];
  if (sel.length < TODAY_QUIZ_TOTAL && sp.length > tp) {
    sel = [...sel, ...sp.slice(tp, tp + (TODAY_QUIZ_TOTAL - sel.length))];
  }
  if (sel.length < TODAY_QUIZ_TOTAL && cur.length > tc) {
    sel = [...sel, ...cur.slice(tc, tc + (TODAY_QUIZ_TOTAL - sel.length))];
  }
  return shuffle(sel);
}
function startGame() {
  const key = WEEK_ORDER[WEEK_ORDER.length - 1];
  if (WORDS_DATA[key].quizMode === 'flash') { startFlashGame('main'); return; }
  currentMode = 'main'; gameWords = buildGameWords(); currentIdx = 0; wrongWords = []; showScreen('screen-game'); loadWord();
}
function startThisWeekReview() {
  const key = WEEK_ORDER[WEEK_ORDER.length - 1];
  if (WORDS_DATA[key].quizMode === 'flash') { startFlashGame('review'); return; }
  currentMode = 'review'; selectedReview = key; gameWords = shuffle([...WORDS_DATA[key].words]); currentIdx = 0; wrongWords = []; showScreen('screen-game'); loadWord();
}
function restartGame() { if (currentMode === 'conv') { convRecordMode === 'convReview' ? startConvReview() : startConvQuiz(); } else if (currentMode === 'review') startReviewGame(); else if (currentMode === 'flash') startFlashGame(fcRecordMode); else startGame(); }
function goStart() { initStart(); }
function loadWord() {
  const w = gameWords[currentIdx];
  filledCount = 0; wordHadMistake = false; revealedFirst = false;
  const pct = (currentIdx / gameWords.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${currentIdx + 1} / ${gameWords.length}`;
  document.getElementById('emojiArea').innerHTML = getGameEmoji(w);
  const row = document.getElementById('blanksRow');
  row.innerHTML = '';
  for (let i = 0; i < w.word.length; i++) {
    const t = document.createElement('div');
    t.className = 'blank-tile' + (i === 0 ? ' current' : '');
    t.id = 'tile-' + i;
    row.appendChild(t);
  }
  document.getElementById('hintText').textContent = '';
  document.getElementById('hintBtn').style.display = (difficulty === 'hard') ? 'none' : '';
  buildLetterButtons(w.word);
  if (difficulty === 'very-easy') revealHalfLetters();
  else if (difficulty === 'easy') revealFirstLetter();
}
function revealFirstLetter() {
  const w = gameWords[currentIdx], t = document.getElementById('tile-0');
  t.textContent = w.word[0]; t.classList.add('revealed'); t.classList.remove('current');
  if (w.word.length > 1) document.getElementById('tile-1').classList.add('current');
  filledCount = 1; revealedFirst = true;
  if (w.word.length === 1) setTimeout(() => wordComplete(), 300);
}
function revealHalfLetters() {
  const w = gameWords[currentIdx];
  // Reveal about half+1 letters at RANDOM positions, always leave at least 1 for the player
  const revealCount = Math.min(Math.ceil(w.word.length / 2) + 1, w.word.length - 1);
  const revealPositions = shuffle(Array.from({length: w.word.length}, (_, i) => i)).slice(0, revealCount);
  revealPositions.forEach(i => {
    const t = document.getElementById('tile-' + i);
    t.textContent = w.word[i]; t.classList.add('revealed'); t.classList.remove('current');
  });
  // Advance filledCount to the first unrevealed tile from the left
  filledCount = 0;
  while (filledCount < w.word.length && document.getElementById('tile-' + filledCount).classList.contains('revealed')) {
    filledCount++;
  }
  if (filledCount < w.word.length) {
    document.getElementById('tile-' + filledCount).classList.add('current');
  } else {
    setTimeout(() => wordComplete(), 300);
  }
}
function buildLetterButtons(word) {
  const needed = [...new Set(word.split(''))], all = 'abcdefghijklmnopqrstuvwxyz'.split('');
  const distractCount = {'very-easy': 2, 'easy': 4, 'hard': 8}[difficulty] ?? 4;
  const distract = shuffle(all.filter(l => !needed.includes(l))).slice(0, distractCount);
  const buttons = [...new Set([...needed, ...distract])].sort();
  const total = buttons.length;
  const cols = total <= 4 ? total : total <= 6 ? 3 : total <= 8 ? 4 : 5;
  const grid = document.getElementById('letterGrid'); grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  buttons.forEach((letter, i) => {
    const btn = document.createElement('button');
    btn.className = 'letter-btn';
    btn.style.background = BTN_COLORS[i % BTN_COLORS.length];
    btn.style.boxShadow = `0 5px 0 0 ${shade(BTN_COLORS[i % BTN_COLORS.length], -18)}`;
    btn.textContent = letter;
    btn.addEventListener('click', () => handleTap(letter, btn));
    grid.appendChild(btn);
  });
}
/* darken a hex by N% for the candy button bottom-shadow */
function shade(hex, percent) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  r = Math.max(0, Math.min(255, Math.round(r * (1 + percent/100))));
  g = Math.max(0, Math.min(255, Math.round(g * (1 + percent/100))));
  b = Math.max(0, Math.min(255, Math.round(b * (1 + percent/100))));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}
function handleTap(letter, btn) {
  const w = gameWords[currentIdx], expected = w.word[filledCount];
  if (letter === expected) {
    triggerAnim(btn, 'flash-ok');
    const t = document.getElementById('tile-' + filledCount);
    t.textContent = letter; t.classList.add('filled'); t.classList.remove('current'); triggerAnim(t, 'pop');
    filledCount++; playSound('correct');
    // Skip over any pre-revealed tiles
    while (filledCount < w.word.length && document.getElementById('tile-' + filledCount).classList.contains('revealed')) {
      filledCount++;
    }
    if (filledCount < w.word.length) document.getElementById('tile-' + filledCount).classList.add('current');
    else wordComplete();
  } else {
    triggerAnim(btn, 'flash-no'); playSound('wrong');
    if (!wordHadMistake) { wordHadMistake = true; wrongWords.push(w); }
  }
}
function triggerAnim(el, cls) {
  el.classList.remove(cls); void el.offsetWidth; el.classList.add(cls);
  el.addEventListener('animationend', () => el.classList.remove(cls), { once: true });
}
function wordComplete() {
  const w = gameWords[currentIdx]; playSound('complete'); speakWord(w.speak || w.word);

function pickConvCorrectAnswer(q) {

}

function startConvQuiz() {
  currentMode = 'conv'; convRecordMode = 'convQuiz';
  const latestKey = CONVERSATION_WEEK_ORDER[CONVERSATION_WEEK_ORDER.length - 1];
  const curQ = shuffle([...CONVERSATION_DATA[latestKey].questions]);
  // 이번 주 3개: 질문 2개 중 1개는 1번, 1개는 2번
  const curPart = [];
  if (curQ.length >= 2) { curPart.push(curQ[0], curQ[1], curQ[1]); }
  else if (curQ.length === 1) { curPart.push(curQ[0], curQ[0], curQ[0]); }
  // 과거 3개: 모든 이전 질문을 반복해서 3개 채움
  const prevQ = [];
  CONVERSATION_WEEK_ORDER.slice(0, -1).forEach(k => prevQ.push(...CONVERSATION_DATA[k].questions));
  let prevPart = [];
  if (prevQ.length > 0) {
    const sp = shuffle(prevQ);
    while (prevPart.length < 3) { prevPart.push(...sp); }
    prevPart = prevPart.slice(0, 3);
  }
  let sel = [...curPart, ...prevPart];
  // 이전 주가 없으면 이번 주로 보충
  if (sel.length < 6 && curQ.length > 0) {
    while (sel.length < 6) { sel.push(curQ[sel.length % curQ.length]); }
  }
  convQuestions = shuffle(sel.slice(0, 6));
  convUsedCorrectAnswers = new Set();
