<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ally's English Game ♡</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff8fb8">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Ally's Game">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Jua&display=swap" rel="stylesheet">
  <script src="words.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    /* ═════════════════════════════════════════
       Ally's English Game — Kawaii / Sanrio
       Palette
       ═════════════════════════════════════════ */
    :root {
      /* surfaces */
      --bg-1:    #fff1f5;     /* cream pink */
      --bg-2:    #f3e8ff;     /* soft lavender */
      --bg-3:    #e0f2fe;     /* sky baby blue */
      --paper:   #fffafd;     /* card cream */
      --paper-2: #fff5f9;     /* card cream subtle */
      /* accents */
      --pink:    #ff8fb8;     /* primary candy pink */
      --pink-d:  #f06aa0;     /* deep pink */
      --pink-s:  #ffd4e3;     /* soft pink */
      --pink-x:  #ffe7ef;     /* extra soft pink */
      --mint:    #9adfc4;     /* sanrio mint */
      --blue:    #a8caff;     /* baby blue */
      --lav:     #c8b9f5;     /* lavender */
      --butter:  #ffe186;     /* butter yellow */
      --peach:   #ffbf9a;     /* peach */
      /* ink */
      --ink:     #5a4658;     /* warm plum-brown */
      --ink-2:   #8a7787;     /* muted plum */
      --ink-3:   #b9a8b3;     /* faint plum */
      --line:    #f6dde7;     /* hairline */
      /* shadow */
      --sh-soft: 0 6px 0 0 #f0c8d8;
      --sh-card: 0 12px 28px -8px rgba(255, 143, 184, 0.25), 0 2px 0 0 #fde0ea;
      --sh-pop:  0 10px 24px -6px rgba(168, 130, 200, 0.35);
    }

    /* ───────── Reset ───────── */
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    button { font: inherit; color: inherit; }

    html, body { min-height: 100dvh; }
    body {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-weight: 700;
      color: var(--ink);
      word-break: keep-all;
      background:
        radial-gradient(at 12% 8%, #ffe2ee 0%, transparent 38%),
        radial-gradient(at 88% 14%, #e2d9ff 0%, transparent 42%),
        radial-gradient(at 50% 92%, #d6ecff 0%, transparent 45%),
        linear-gradient(170deg, var(--bg-1) 0%, var(--bg-2) 55%, var(--bg-3) 100%);
      background-attachment: fixed;
      min-height: 100dvh;
      overflow-x: hidden;
      position: relative;
    }

    /* Decorative floating shapes — full screen, behind everything */
    .deco {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      overflow: hidden;
    }
    .deco svg { position: absolute; opacity: 0.55; }
    .deco .d1 { top: 4%;  left: 4%;  width: 64px; animation: floaty 7s ease-in-out infinite; }
    .deco .d2 { top: 18%; right: 6%; width: 52px; animation: floaty 9s ease-in-out infinite 1s; }
    .deco .d3 { top: 62%; left: 3%;  width: 44px; animation: floaty 8s ease-in-out infinite 2s; }
    .deco .d4 { top: 78%; right: 4%; width: 72px; animation: floaty 10s ease-in-out infinite .5s; }
    .deco .d5 { top: 42%; right: 2%; width: 38px; animation: floaty 6s ease-in-out infinite 1.5s; }
    .deco .d6 { top: 86%; left: 30%; width: 36px; animation: floaty 7.5s ease-in-out infinite 2.5s; }
    .deco .d7 { top: 6%;  left: 48%; width: 42px; animation: floaty 8.5s ease-in-out infinite 1.8s; }
    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%      { transform: translateY(-14px) rotate(4deg); }
    }
    @media (max-width: 520px) {
      .deco .d1, .deco .d7 { display: none; }
    }

    /* ───────── Layout shell ───────── */
    .stage {
      position: relative; z-index: 1;
      min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center;
      padding: 18px 16px 48px;
    }
    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 480px;
    }
    @media (min-width: 720px) {
      .stage { padding: 28px 28px 64px; }
      .screen { max-width: 680px; }
    }
    @media (min-width: 1024px) {
      .screen { max-width: 760px; }
    }

    /* ═══════════════════════════════════════
       START SCREEN
       ═══════════════════════════════════════ */
    .hero {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
      margin: 6px 0 22px;
    }
    .hero-text { padding-bottom: 6px; }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Jua', 'Pretendard Variable', Pretendard, sans-serif;
      font-size: 0.9rem; color: var(--pink-d);
      background: white;
      padding: 5px 12px 4px; border-radius: 999px;
      box-shadow: 0 2px 0 0 var(--pink-s);
      margin-bottom: 10px;
      white-space: nowrap;
      word-break: keep-all;
    }
    .hero-title {
      font-family: 'Fredoka', 'Jua', sans-serif;
      font-weight: 700;
      font-size: clamp(2rem, 6vw, 2.8rem);
      line-height: 1;
      color: var(--ink);
      letter-spacing: -0.5px;
    }
    .hero-title .ally {
      color: var(--pink-d);
      display: inline-block;
      transform: rotate(-3deg);
    }
    .hero-title .sparkle { color: var(--butter); }
    .hero-sub {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-weight: 400;
      font-size: 1.05rem;
      color: var(--ink-2);
      margin-top: 6px;
    }
    .hero-mascot { width: 96px; height: 110px; }
    @media (min-width: 720px) {
      .hero-mascot { width: 140px; height: 160px; }
      .hero-title { font-size: 3.4rem; }
      .hero-sub { font-size: 1.25rem; }
    }

    /* ── Mode tabs ── */
    .mode-tabs {
      display: flex; width: 100%; gap: 10px; margin-bottom: 18px;
    }
    .mode-tab {
      flex: 1;
      padding: 14px 10px 12px;
      border-radius: 22px;
      border: none;
      background: var(--paper);
      box-shadow: 0 4px 0 0 #fadbe8, inset 0 0 0 2px #fde9f0;
      font-family: 'Jua', 'Pretendard Variable', Pretendard, sans-serif;
      font-size: 1.05rem; color: var(--ink-2);
      cursor: pointer; touch-action: manipulation;
      transition: transform .12s, box-shadow .12s, background .15s, color .15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .mode-tab svg { width: 24px; height: 24px; flex: 0 0 auto; }
    .mode-tab:active { transform: translateY(2px); box-shadow: 0 2px 0 0 #fadbe8, inset 0 0 0 2px #fde9f0; }
    .mode-tab.active {
      background: linear-gradient(180deg, #fff 0%, #ffeaf2 100%);
      color: var(--pink-d);
      box-shadow: 0 4px 0 0 var(--pink), inset 0 0 0 2px var(--pink);
    }

    /* ── Review list ── */
    .review-list {
      display: none; flex-direction: column; gap: 10px;
      width: 100%; margin-bottom: 18px;
    }
    .review-list.visible { display: flex; }
    .review-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-radius: 18px;
      background: var(--paper);
      box-shadow: 0 3px 0 0 #f3dee8, inset 0 0 0 1.5px #fbe6ef;
      cursor: pointer; touch-action: manipulation;
      transition: transform .12s, box-shadow .12s;
    }
    .review-item:active { transform: translateY(1px); }
    .review-item.selected {
      background: linear-gradient(180deg, #fff 0%, #fff5f9 100%);
      box-shadow: 0 3px 0 0 var(--pink), inset 0 0 0 2px var(--pink);
    }
    .ri-dot {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--pink-s);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Jua', sans-serif; color: var(--pink-d); font-size: 0.95rem;
    }
    .review-item.selected .ri-dot { background: var(--pink); color: white; }
    .ri-label {
      flex: 1;
      font-family: 'Jua', 'Pretendard Variable', Pretendard, sans-serif;
      font-size: 1.05rem; color: var(--ink);
    }
    .ri-count {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-size: 0.95rem; color: var(--ink-3);
    }
    .badge {
      display: inline-block; vertical-align: 1px;
      background: var(--pink);
      color: white; font-family: 'Jua', sans-serif;
      font-size: 0.7rem; padding: 1px 8px 0; border-radius: 999px;
      margin-left: 6px;
    }

    /* ── Section label ── */
    .section-label {
      font-family: 'Jua', sans-serif;
      font-size: 1rem; color: var(--ink);
      align-self: flex-start;
      margin: 6px 0 10px 4px;
      display: flex; align-items: center; gap: 6px;
    }
    .section-label svg { width: 18px; height: 18px; }

    /* ── Difficulty ── */
    .difficulty-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 8px; width: 100%; margin-bottom: 20px;
    }
    .diff-btn {
      padding: 10px 4px 12px;
      border-radius: 18px;
      border: none;
      background: var(--paper);
      box-shadow: 0 3px 0 0 #f3dee8, inset 0 0 0 1.5px #fbe6ef;
      cursor: pointer; touch-action: manipulation;
      transition: transform .12s, box-shadow .12s;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      font-family: 'Jua', 'Pretendard Variable', Pretendard, sans-serif;
    }
    .diff-btn:active { transform: translateY(1px); }
    .diff-btn .d-face {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      box-shadow: inset 0 -3px 0 0 rgba(0,0,0,0.04);
    }
    .diff-btn .d-name {
      font-size: 0.95rem; color: var(--ink); line-height: 1;
      white-space: nowrap; word-break: keep-all;
    }
    .diff-btn .d-hint {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-weight: 400; font-size: 0.78rem; color: var(--ink-3); line-height: 1.1;
      white-space: nowrap; word-break: keep-all;
    }
    .diff-btn[data-d="very-easy"] .d-face { background: var(--mint); }
    .diff-btn[data-d="easy"]      .d-face { background: var(--blue); }
    .diff-btn[data-d="hard"]      .d-face { background: var(--peach); }
    .diff-btn.selected {
      background: linear-gradient(180deg, #fff 0%, #fff5f9 100%);
      box-shadow: 0 3px 0 0 var(--pink), inset 0 0 0 2px var(--pink);
    }

    /* ── Info box ── */
    .info-box {
      position: relative;
      width: 100%;
      background: var(--paper);
      border-radius: 22px;
      padding: 16px 18px 16px 22px;
      margin-bottom: 26px;
      box-shadow: var(--sh-card);
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-weight: 400;
      font-size: 1.05rem; color: var(--ink-2);
      line-height: 1.6;
    }
    .info-box::before {
      content: '';
      position: absolute; left: 0; top: 14px; bottom: 14px; width: 4px;
      background: var(--pink); border-radius: 4px;
    }
    .info-box strong { font-weight: 700; color: var(--pink-d); }

    /* ── Start button ── */
    .start-btn {
      position: relative;
      background: linear-gradient(180deg, #ff9fc2 0%, var(--pink) 60%, var(--pink-d) 100%);
      color: white; border: none;
      border-radius: 28px;
      padding: 16px 56px 18px;
      font-family: 'Fredoka', 'Jua', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: 0.5px;
      cursor: pointer; touch-action: manipulation;
      box-shadow: 0 6px 0 0 var(--pink-d), 0 14px 26px -8px rgba(240,106,160,0.6);
      transition: transform .1s, box-shadow .1s;
    }
    .start-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 0 var(--pink-d), 0 6px 14px -6px rgba(240,106,160,0.6);
    }
    .start-btn::after {
      content: '♡';
      position: absolute; top: -10px; right: -8px;
      width: 28px; height: 28px;
      background: var(--butter); color: var(--pink-d);
      font-family: 'Fredoka', sans-serif; font-size: 1rem;
      border-radius: 50%;
      display: grid; place-items: center;
      box-shadow: 0 2px 0 0 #e8c454;
      transform: rotate(12deg);
    }

    /* ═══════════════════════════════════════
       GAME SCREEN
       ═══════════════════════════════════════ */
    .top-bar {
      width: 100%;
      display: flex; align-items: center; gap: 12px;
      margin: 6px 0 16px;
    }
    .home-btn {
      width: 38px; height: 38px;
      border: none; border-radius: 50%;
      background: var(--paper);
      box-shadow: 0 3px 0 0 #f3dee8;
      cursor: pointer;
      display: grid; place-items: center;
      flex: 0 0 auto;
    }
    .home-btn svg { width: 18px; height: 18px; color: var(--pink-d); }
    .home-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 0 #f3dee8; }
    .progress-track {
      flex: 1; height: 16px;
      background: white;
      border-radius: 999px;
      overflow: hidden;
      box-shadow: inset 0 2px 0 0 #fde0ea, inset 0 0 0 2px #fde0ea;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pink) 0%, var(--lav) 60%, var(--blue) 100%);
      border-radius: 999px;
      transition: width 0.6s cubic-bezier(.22,1,.36,1);
      width: 0%;
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute; top: 2px; left: 6px; right: 6px; height: 4px;
      background: rgba(255,255,255,0.55); border-radius: 999px;
    }
    .progress-label {
      font-family: 'Jua', sans-serif;
      font-size: 1rem; color: var(--ink);
      background: white;
      padding: 6px 12px 5px;
      border-radius: 999px;
      box-shadow: 0 3px 0 0 #fde0ea;
      white-space: nowrap;
    }

    /* ── Game card ── */
    .game-card {
      position: relative;
      width: 100%;
      background: var(--paper);
      border-radius: 32px;
      box-shadow: var(--sh-card);
      padding: 28px 20px 24px;
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 22px;
    }
    .game-card::before {
      content: ''; position: absolute; top: 14px; left: 14px; right: 14px; bottom: 14px;
      border-radius: 22px;
      border: 2px dashed #ffd4e3;
      pointer-events: none;
      opacity: 0.5;
    }
    .game-card-tag {
      position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
      background: var(--pink); color: white;
      font-family: 'Jua', sans-serif;
      font-size: 0.85rem;
      padding: 4px 16px 3px; border-radius: 999px;
      box-shadow: 0 3px 0 0 var(--pink-d);
      display: flex; align-items: center; gap: 5px;
    }
    .game-card-tag svg { width: 14px; height: 14px; }

    .emoji-area {
      font-size: 96px;
      line-height: 1;
      min-height: 110px;
      display: flex; align-items: center; justify-content: center;
      margin: 10px 0 6px;
      position: relative;
      z-index: 2;
    }
    .emoji-area::before, .emoji-area::after {
      content: '✦'; position: absolute;
      font-family: 'Fredoka', sans-serif;
      color: var(--butter); font-size: 22px;
      opacity: 0.8;
    }
    .emoji-area::before { top: 10px; left: 8%; animation: twinkle 2.4s ease-in-out infinite; }
    .emoji-area::after  { top: 18px; right: 10%; animation: twinkle 2.4s ease-in-out infinite 1.2s; color: var(--pink); }
    @keyframes twinkle {
      0%,100% { transform: scale(.7) rotate(0); opacity: .3; }
      50%     { transform: scale(1.15) rotate(20deg); opacity: 1; }
    }
    @media (min-width: 720px) {
      .emoji-area { font-size: 130px; min-height: 150px; }
    }

    .speak-btn {
      background: white;
      border: none;
      border-radius: 999px;
      padding: 9px 22px 8px;
      font-family: 'Jua', sans-serif;
      font-size: 1rem;
      color: var(--pink-d);
      cursor: pointer; touch-action: manipulation;
      margin-bottom: 22px;
      box-shadow: 0 3px 0 0 var(--pink-s), inset 0 0 0 2px var(--pink-s);
      transition: transform .1s, box-shadow .1s;
      display: inline-flex; align-items: center; gap: 8px;
      z-index: 2;
    }
    .speak-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 0 var(--pink-s), inset 0 0 0 2px var(--pink-s); }
    .speak-btn svg { width: 18px; height: 18px; }

    .blanks-row {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 8px; margin-bottom: 18px;
      z-index: 2;
    }
    .blank-tile {
      min-width: 40px; height: 56px;
      border-bottom: 3px solid var(--ink-3);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fredoka', sans-serif; font-weight: 700;
      font-size: 32px;
      color: var(--pink-d);
      padding: 0 4px;
      transition: border-color 0.2s;
      position: relative;
    }
    .blank-tile.current {
      border-bottom-color: var(--pink);
    }
    .blank-tile.current::after {
      content: '♡';
      position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
      font-family: 'Fredoka', sans-serif; font-size: 14px;
      color: var(--pink);
      animation: bounce-arrow 1s ease-in-out infinite;
    }
    .blank-tile.filled { border-bottom-color: var(--pink); }
    .blank-tile.revealed { color: var(--lav); border-bottom-color: var(--lav); }
    .blank-tile.pop { animation: pop 0.4s cubic-bezier(.5,1.6,.45,.9); }
    @keyframes bounce-arrow {
      0%,100% { transform: translate(-50%, 0); }
      50%     { transform: translate(-50%, -4px); }
    }
    @media (min-width: 720px) {
      .blank-tile { min-width: 56px; height: 72px; font-size: 44px; }
    }

    .hint-area {
      display: flex; flex-direction: column; align-items: center;
      gap: 8px;
      margin-top: 6px;
      z-index: 2;
    }
    .hint-btn {
      background: transparent;
      border: none;
      padding: 6px 14px;
      font-family: 'Pretendard Variable', Pretendard, sans-serif; font-weight: 700;
      font-size: 0.95rem;
      color: var(--ink-3);
      cursor: pointer; touch-action: manipulation;
      transition: color .2s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .hint-btn:active { color: var(--pink-d); }
    .hint-btn svg { width: 16px; height: 16px; }
    .hint-text {
      font-family: 'Jua', sans-serif;
      font-size: 1.1rem;
      color: var(--lav);
      min-height: 1.4em;
      text-align: center;
    }
    .hint-text:not(:empty) {
      background: #f1ebff;
      padding: 6px 16px 4px;
      border-radius: 999px;
    }

    /* ── Letter buttons (candy bubbles) ── */
    .letter-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      width: 100%;
      max-width: 460px;
    }
    @media (min-width: 720px) {
      .letter-grid {
        gap: 14px; max-width: 580px;
      }
    }
    .letter-btn {
      aspect-ratio: 1;
      border-radius: 22px;
      border: none;
      font-family: 'Fredoka', sans-serif; font-weight: 700;
      font-size: clamp(1.6rem, 5vw, 2rem);
      color: white;
      cursor: pointer; touch-action: manipulation;
      transition: transform 0.1s, box-shadow .1s;
      user-select: none;
      position: relative;
      text-shadow: 0 1.5px 0 rgba(0,0,0,0.08);
    }
    .letter-btn::before {
      content: ''; position: absolute;
      top: 6px; left: 14%; right: 14%; height: 30%;
      border-radius: 999px;
      background: rgba(255,255,255,0.55);
      pointer-events: none;
    }
    .letter-btn:active { transform: translateY(3px); }
    .letter-btn:disabled { opacity: 0.4; }
    .letter-btn.flash-ok   { animation: flash-ok   0.5s ease; }
    .letter-btn.flash-no   { animation: flash-no   0.5s ease; }

    /* ── Word complete toast ── */
    .word-toast {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Fredoka', 'Jua', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--ink);
      background: white;
      padding: 28px 36px 24px;
      border-radius: 32px;
      pointer-events: none;
      animation: toast-in 0.45s cubic-bezier(.4,1.6,.45,.95);
      z-index: 200;
      box-shadow: 0 12px 40px -8px rgba(255, 143, 184, 0.5), 0 0 0 4px white, 0 0 0 6px var(--pink-s);
      text-align: center;
      max-width: 80vw;
    }
    .word-toast .toast-big {
      font-size: 2.6rem; display: block;
      margin-bottom: 4px;
      color: var(--pink-d);
    }
    .word-toast .toast-emoji {
      font-size: 3rem; display: block; line-height: 1; margin-bottom: 8px;
    }

    /* ═══════════════════════════════════════
       RESULT SCREEN
       ═══════════════════════════════════════ */
    .result-card {
      width: 100%;
      background: var(--paper);
      border-radius: 32px;
      box-shadow: var(--sh-card);
      padding: 36px 24px 28px;
      text-align: center;
      margin-top: 12px;
      position: relative;
    }
    .result-mascot {
      width: 110px; height: 110px;
      margin: 0 auto -28px;
      display: block;
      position: relative;
      top: -50px;
      margin-bottom: -38px;
    }
    .stars-display {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .stars-display svg { width: 52px; height: 52px; }
    .stars-display .star-on  { color: var(--butter); filter: drop-shadow(0 4px 0 #e8c454); }
    .stars-display .star-off { color: #f0e3ec; }
    .stars-display .star-on:nth-child(2) {
      width: 64px; height: 64px;
      animation: star-pop .6s ease;
    }
    @keyframes star-pop {
      0% { transform: scale(0) rotate(-20deg); }
      70% { transform: scale(1.2) rotate(8deg); }
      100% { transform: scale(1); }
    }
    .result-msg {
      font-family: 'Jua', sans-serif;
      font-size: 1.4rem; color: var(--ink);
      margin-bottom: 6px;
    }
    .result-sub {
      font-family: 'Pretendard Variable', Pretendard, sans-serif;
      font-weight: 400; font-size: 1.05rem;
      color: var(--ink-2);
      margin-bottom: 24px;
    }
    .wrong-section { text-align: left; margin-top: 8px; }
    .wrong-header {
      font-family: 'Jua', sans-serif;
      font-size: 1rem; color: var(--ink);
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .wrong-header svg { width: 16px; height: 16px; color: var(--pink); }
    .wrong-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      background: var(--pink-x);
      border-radius: 16px;
      margin-bottom: 8px;
    }
    .wrong-item .w-emoji { font-size: 1.7rem; }
    .wrong-item .w-word  {
      font-family: 'Fredoka', sans-serif; font-weight: 700;
      font-size: 1.15rem; color: var(--pink-d);
    }
    .wrong-item .w-meaning {
      color: var(--ink-2);
      font-family: 'Pretendard Variable', Pretendard, sans-serif; font-weight: 400;
      font-size: 0.95rem;
      margin-left: auto;
    }

    .action-row {
      display: flex; gap: 12px; justify-content: center;
      flex-wrap: wrap; margin-top: 28px;
    }
    .action-btn {
      padding: 13px 24px 14px;
      border-radius: 999px; border: none;
      font-family: 'Jua', sans-serif;
      font-size: 1.05rem;
      cursor: pointer; touch-action: manipulation;
      transition: transform .1s, box-shadow .1s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .action-btn:active { transform: translateY(2px); }
    .action-btn.primary {
      background: var(--pink); color: white;
      box-shadow: 0 4px 0 0 var(--pink-d);
    }
    .action-btn.primary:active { box-shadow: 0 2px 0 0 var(--pink-d); }
    .action-btn.secondary {
      background: white; color: var(--ink-2);
      box-shadow: 0 4px 0 0 #fde0ea, inset 0 0 0 2px #fde0ea;
    }
    .action-btn.secondary:active { box-shadow: 0 2px 0 0 #fde0ea, inset 0 0 0 2px #fde0ea; }

    .email-status {
      font-family: 'Pretendard Variable', Pretendard, sans-serif; font-weight: 400;
      font-size: 0.9rem; color: var(--ink-3);
      margin-top: 16px; min-height: 1.4em;
      text-align: center;
      transition: color 0.3s;
    }
    .email-status.ok  { color: var(--mint); font-weight: 700; }
    .email-status.err { color: var(--peach); }

    /* ── Keyframes ── */
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      70%  { transform: scale(.92); }
      100% { transform: scale(1); }
    }
    @keyframes flash-ok {
      0%   { transform: scale(1); filter: brightness(1); }
      35%  { transform: scale(1.18); filter: brightness(1.15) saturate(1.3); }
      100% { transform: scale(1); filter: brightness(1); }
    }
    @keyframes flash-no {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-9px); }
      40%  { transform: translateX(9px); }
      60%  { transform: translateX(-6px); }
      80%  { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }
    @keyframes toast-in {
      0%   { transform: translate(-50%,-50%) scale(0.4) rotate(-6deg); opacity: 0; }
      65%  { transform: translate(-50%,-50%) scale(1.08) rotate(2deg); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1) rotate(0); opacity: 1; }
    }
    @keyframes mascot-wave {
      0%, 100% { transform: rotate(-4deg); }
      50%      { transform: rotate(4deg); }
    }
    .hero-mascot { animation: mascot-wave 3.5s ease-in-out infinite; transform-origin: 50% 100%; }

    /* ── Weekly record strip ── */
    .weekly-strip {
      width: 100%;
      background: var(--paper);
      border-radius: 22px;
      box-shadow: var(--sh-card);
      padding: 14px 16px 16px;
      margin-bottom: 18px;
    }
    .weekly-strip-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .weekly-strip-title {
      font-family: 'Jua', sans-serif;
      font-size: 0.95rem; color: var(--ink);
      display: flex; align-items: center; gap: 6px;
    }
    .weekly-strip-title svg { width: 16px; height: 16px; color: var(--pink); }
    .weekly-strip-streak {
      font-family: 'Jua', sans-serif;
      font-size: 0.85rem; color: var(--pink-d);
      background: var(--pink-x);
      padding: 3px 10px 2px;
      border-radius: 999px;
    }
    .day-row {
      display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px;
    }
    .day-cell {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .day-label {
      font-family: 'Jua', sans-serif;
      font-size: 0.72rem; color: var(--ink-3);
    }
    .day-label.today { color: var(--pink-d); }
    .day-dot {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #f6eef3;
      border: 2px solid #f0e0ea;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      transition: transform .2s;
    }
    .day-dot.done {
      background: linear-gradient(160deg, #ffb8d8 0%, var(--pink) 100%);
      border-color: var(--pink-d);
      box-shadow: 0 3px 0 0 var(--pink-d);
    }
    .day-dot.today-empty {
      border-color: var(--pink);
      border-style: dashed;
    }
    .day-dot.done { animation: dot-pop .4s cubic-bezier(.5,1.6,.45,.9); }
    @keyframes dot-pop {
      0%   { transform: scale(0.6); }
      70%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .day-stars {
      font-family: 'Jua', sans-serif;
      font-size: 0.65rem; color: var(--pink-d);
      letter-spacing: -1px;
      min-height: 1em;
    }
  </style>
</head>

<script>
emailjs.init({ publicKey: 'SmEGPotCOv7j_TAqw' });

/* Candy palette for letter buttons */
const BTN_COLORS = [
  '#ff9fc2', // candy pink
  '#a8caff', // baby blue
  '#9adfc4', // mint
  '#c8b9f5', // lavender
  '#ffc78a', // peach
  '#ffd66e', // butter
  '#ff8fb8', // hot pink
  '#88c7f5', // sky
  '#ffb1d4', // rose
  '#bce0a5', // pistachio
  '#f5a8c8', // bubblegum
  '#a3d8f5', // cyan
];

let currentMode = 'main';
let selectedReview = WEEK_ORDER[WEEK_ORDER.length - 1];
let difficulty = 'very-easy';
let gameWords = [], currentIdx = 0, filledCount = 0, wordHadMistake = false, wrongWords = [], revealedFirst = false;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  document.getElementById(id).style.display = 'flex';
}
function getGameEmoji(w) {
  if (w.svgEmoji) {
    return `<svg width="124" height="86" viewBox="0 0 124 86" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle">
      <rect width="124" height="86" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="2"/>
      <circle cx="62" cy="43" r="26" fill="#bc002d"/>
    </svg><span style="font-size:52px;margin-left:6px">🏝️</span>`;
  }
  return `<span>${w.emoji}</span>`;
}

function selectMode(mode) {
  currentMode = mode;
  document.getElementById('tabMain').classList.toggle('active', mode === 'main');
  document.getElementById('tabReview').classList.toggle('active', mode === 'review');
  const rl = document.getElementById('reviewList');
  if (mode === 'review') { rl.classList.add('visible'); buildReviewList(); }
  else { rl.classList.remove('visible'); }
  updateInfoBox();
}
function buildReviewList() {
  const list = document.getElementById('reviewList');
  list.innerHTML = '';
  const latestKey = WEEK_ORDER[WEEK_ORDER.length - 1];
  [...WEEK_ORDER].reverse().forEach((key, idx) => {
    const item = document.createElement('div');
    item.className = 'review-item' + (key === selectedReview ? ' selected' : '');
    const isLatest = key === latestKey;
    const num = WEEK_ORDER.indexOf(key) + 1;
    item.innerHTML = `
      <span class="ri-dot">${num}</span>
      <span class="ri-label">${WORDS_DATA[key].label}${isLatest ? '<span class="badge">NEW</span>' : ''}</span>
      <span class="ri-count">${WORDS_DATA[key].words.length} words</span>
    `;
    item.onclick = () => {
      selectedReview = key;
      document.querySelectorAll('.review-item').forEach(i => i.classList.remove('selected'));
      item.classList.add('selected');
      updateInfoBox();
    };
    list.appendChild(item);
  });
}
function selectDiff(d) {
  difficulty = d;
  ['very-easy','easy','hard'].forEach(k => document.getElementById('diff-' + k).classList.toggle('selected', k === d));
}
/* ── Weekly record (localStorage) ── */
const STORAGE_KEY = 'ally_game_records';
function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function saveRecord(stars, correct, total) {
  const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  const key = getTodayKey();
  // 오늘 기록이 이미 있으면 별이 더 많은 것만 덮어씀
  if (!records[key] || stars > records[key].stars) {
    records[key] = { stars, correct, total, ts: Date.now() };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }
}
function buildWeeklyStrip() {
  const records = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  const today = new Date();
  const todayKey = getTodayKey();
  // 이번 주 월요일 구하기
  const dow = today.getDay(); // 0=일
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  const monday = new Date(today);
  monday.setDate(today.getDate() + mondayOffset);
  const DAY_LABELS = ['월','화','수','목','금','토','일'];
  // 연속 완료 스트릭 계산
  let streak = 0;
  for (let i = 0; i < 30; i++) {
    const d = new Date(today); d.setDate(today.getDate() - i);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (records[k]) streak++; else break;
  }
  let cells = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const isToday = key === todayKey;
    const rec = records[key];
    const isFuture = d > today && !isToday;
    let dotClass = 'day-dot';
    if (rec) dotClass += ' done';
    else if (isToday) dotClass += ' today-empty';
    const emoji = rec ? '⭐' : (isFuture ? '' : (isToday ? '♡' : ''));
    const starsStr = rec ? '★'.repeat(rec.stars) + '☆'.repeat(3 - rec.stars) : '';
    cells += `<div class="day-cell">
      <span class="day-label${isToday ? ' today' : ''}">${DAY_LABELS[i]}</span>
      <div class="${dotClass}">${emoji}</div>
      <span class="day-stars">${starsStr}</span>
    </div>`;
  }
  const streakBadge = streak > 1 ? `<span class="weekly-strip-streak">🔥 ${streak}일 연속!</span>` : '';
  document.getElementById('weeklyStrip').innerHTML = `
    <div class="weekly-strip-header">
      <span class="weekly-strip-title">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.9l-6.2 4.4 2.4-7.4L2 9.4h7.6z"/></svg>
        이번 주 기록
      </span>
      ${streakBadge}
    </div>
    <div class="day-row">${cells}</div>
  `;
}
function initStart() { buildReviewList(); updateInfoBox(); buildWeeklyStrip(); showScreen('screen-start'); }
function updateInfoBox() {
  const box = document.getElementById('infoBox');
  if (currentMode === 'main') {
    const lk = WEEK_ORDER[WEEK_ORDER.length - 1], lw = WORDS_DATA[lk].words, prev = [];
    WEEK_ORDER.slice(0, -1).forEach(k => prev.push(...WORDS_DATA[k].words));
    if (prev.length === 0) {
      box.innerHTML = `<strong>이번 주 단어 ${lw.length}개</strong> 중에서<br><strong>${Math.min(10, lw.length)}문제</strong> 랜덤으로 풀어요 ♡`;
    } else {
      const tc = Math.min(5, lw.length), tp = Math.min(5, prev.length);
      box.innerHTML = `<strong>이번 주</strong> ${tc}개 + <strong>이전 단어</strong> ${tp}개<br>= 총 <strong>${tc + tp}문제</strong> 랜덤으로 풀어요 ♡`;
    }
  } else {
    const w = WORDS_DATA[selectedReview].words;
    box.innerHTML = `<strong>${WORDS_DATA[selectedReview].label}</strong> 단어 <strong>${w.length}개</strong>를 전부 복습해요 ♪`;
  }
}
function buildGameWords() {
  if (currentMode === 'review') return shuffle([...WORDS_DATA[selectedReview].words]);
  const lk = WEEK_ORDER[WEEK_ORDER.length - 1], cur = shuffle([...WORDS_DATA[lk].words]), prev = [];
  WEEK_ORDER.slice(0, -1).forEach(k => prev.push(...WORDS_DATA[k].words));
  const sp = shuffle(prev);
  if (prev.length === 0) return cur.slice(0, Math.min(10, cur.length));
  const tc = Math.min(5, cur.length), tp = Math.min(5, sp.length);
  let sel = [...cur.slice(0, tc), ...sp.slice(0, tp)];
  if (sel.length < 10 && cur.length > tc) sel = [...sel, ...cur.slice(tc, tc + (10 - sel.length))];
  return shuffle(sel);
}
function startGame() { gameWords = buildGameWords(); currentIdx = 0; wrongWords = []; showScreen('screen-game'); loadWord(); }
function restartGame() { startGame(); }
function goStart() { initStart(); }
function loadWord() {
  const w = gameWords[currentIdx];
  filledCount = 0; wordHadMistake = false; revealedFirst = false;
  const pct = (currentIdx / gameWords.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${currentIdx + 1} / ${gameWords.length}`;
  document.getElementById('emojiArea').innerHTML = getGameEmoji(w);
  const row = document.getElementById('blanksRow');
  row.innerHTML = '';
  for (let i = 0; i < w.word.length; i++) {
    const t = document.createElement('div');
    t.className = 'blank-tile' + (i === 0 ? ' current' : '');
    t.id = 'tile-' + i;
    row.appendChild(t);
  }
  document.getElementById('hintText').textContent = '';
  document.getElementById('hintBtn').style.display = (difficulty === 'hard') ? 'none' : '';
  buildLetterButtons(w.word);
  if (difficulty === 'very-easy') revealHalfLetters();
  else if (difficulty === 'easy') revealFirstLetter();
}
function revealFirstLetter() {
  const w = gameWords[currentIdx], t = document.getElementById('tile-0');
  t.textContent = w.word[0]; t.classList.add('revealed'); t.classList.remove('current');
  if (w.word.length > 1) document.getElementById('tile-1').classList.add('current');
  filledCount = 1; revealedFirst = true;
  if (w.word.length === 1) setTimeout(() => wordComplete(), 300);
}
function revealHalfLetters() {
  const w = gameWords[currentIdx];
  const revealCount = Math.ceil(w.word.length / 2);
  for (let i = 0; i < revealCount; i++) {
    const t = document.getElementById('tile-' + i);
    t.textContent = w.word[i]; t.classList.add('revealed'); t.classList.remove('current');
  }
  filledCount = revealCount;
  if (revealCount < w.word.length) {
    document.getElementById('tile-' + revealCount).classList.add('current');
  }
  if (revealCount >= w.word.length) setTimeout(() => wordComplete(), 300);
}
function buildLetterButtons(word) {
  const needed = [...new Set(word.split(''))], all = 'abcdefghijklmnopqrstuvwxyz'.split('');
  const distractCount = {'very-easy': 2, 'easy': 4, 'hard': 8}[difficulty] ?? 4;
  const distract = shuffle(all.filter(l => !needed.includes(l))).slice(0, distractCount);
  const buttons = [...new Set([...needed, ...distract])].sort();
  const total = buttons.length;
  const cols = total <= 4 ? total : total <= 6 ? 3 : total <= 8 ? 4 : 5;
  const grid = document.getElementById('letterGrid'); grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  buttons.forEach((letter, i) => {
    const btn = document.createElement('button');
    btn.className = 'letter-btn';
    btn.style.background = BTN_COLORS[i % BTN_COLORS.length];
    btn.style.boxShadow = `0 5px 0 0 ${shade(BTN_COLORS[i % BTN_COLORS.length], -18)}`;
    btn.textContent = letter;
    btn.addEventListener('click', () => handleTap(letter, btn));
    grid.appendChild(btn);
  });
}
/* darken a hex by N% for the candy button bottom-shadow */
function shade(hex, percent) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  r = Math.max(0, Math.min(255, Math.round(r * (1 + percent/100))));
  g = Math.max(0, Math.min(255, Math.round(g * (1 + percent/100))));
  b = Math.max(0, Math.min(255, Math.round(b * (1 + percent/100))));
  return '#' + ((r << 16) | (g << 8) | b).toString(16).padStart(6, '0');
}
function handleTap(letter, btn) {
  const w = gameWords[currentIdx], expected = w.word[filledCount];
  if (letter === expected) {
    triggerAnim(btn, 'flash-ok');
    const t = document.getElementById('tile-' + filledCount);
    t.textContent = letter; t.classList.add('filled'); t.classList.remove('current'); triggerAnim(t, 'pop');
    filledCount++; playSound('correct');
    if (filledCount < w.word.length) document.getElementById('tile-' + filledCount).classList.add('current');
    else wordComplete();
  } else {
    triggerAnim(btn, 'flash-no'); playSound('wrong');
    if (!wordHadMistake) { wordHadMistake = true; wrongWords.push(w); }
  }
}
function triggerAnim(el, cls) {
  el.classList.remove(cls); void el.offsetWidth; el.classList.add(cls);
  el.addEventListener('animationend', () => el.classList.remove(cls), { once: true });
}
function wordComplete() {
  const w = gameWords[currentIdx]; playSound('complete'); speakWord(w.word);
  const toast = document.createElement('div'); toast.className = 'word-toast';
  const msgs = wordHadMistake
    ? [{e:'👏', t:'잘했어요!'}, {e:'💪', t:'좋아요!'}, {e:'🌷', t:'다음도!'}]
    : [{e:'🌟', t:'완벽해요!'}, {e:'✨', t:'대단해!'}, {e:'💖', t:'최고야!'}, {e:'🎀', t:'예쁘다!'}];
  const m = msgs[Math.floor(Math.random() * msgs.length)];
  toast.innerHTML = `<span class="toast-emoji">${m.e}</span><span class="toast-big">${w.word}</span><span>${m.t}</span>`;
  document.body.appendChild(toast);
  document.querySelectorAll('.letter-btn').forEach(b => b.disabled = true);
  setTimeout(() => { toast.remove(); currentIdx++; if (currentIdx < gameWords.length) loadWord(); else showResult(); }, 2000);
}
function starSvg(filled) {
  return `<svg viewBox="0 0 24 24" fill="currentColor" class="${filled ? 'star-on' : 'star-off'}"><path d="M12 2l2.9 7.1L22 10l-5.5 4.6L18.5 22 12 17.7 5.5 22 7.5 14.6 2 10l7.1-.9z"/></svg>`;
}
function showResult() {
  const uw = [...new Map(wrongWords.map(w => [w.word, w])).values()], cc = gameWords.length - uw.length;
  let stars = 3; if (uw.length >= 2) stars = 2; if (uw.length >= 4) stars = 1; if (uw.length >= 7) stars = 0;
  document.getElementById('starsDisplay').innerHTML = [0,1,2].map(i => starSvg(i < stars)).join('');
  const msgs = [
    ['조금만 더 연습해요!', '괜찮아요, 다음엔 잘할 수 있어요'],
    ['잘하고 있어요!',     '조금만 더 연습하면 완벽해요'],
    ['아주 잘했어요!',     '거의 다 맞췄어요'],
    ['완벽해요!',          '모든 단어를 다 맞췄어요']
  ];
  const [mm, sm] = msgs[stars];
  document.getElementById('resultMsg').textContent = `${gameWords.length}개 중 ${cc}개 정답! ${mm}`;
  document.getElementById('resultSub').textContent = sm;
  const section = document.getElementById('wrongSection'); section.innerHTML = '';
  if (uw.length > 0) {
    const h = document.createElement('div');
    h.className = 'wrong-header';
    h.innerHTML = `
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 16.9l-6.2 4.4 2.4-7.4L2 9.4h7.6z"/></svg>
      다시 확인해요`;
    section.appendChild(h);
    uw.forEach(w => {
      const item = document.createElement('div');
      item.className = 'wrong-item';
      item.innerHTML = `<span class="w-emoji">${w.emoji}</span><span class="w-word">${w.word}</span><span class="w-meaning">${w.meaning}</span>`;
      section.appendChild(item);
    });
  }
  saveRecord(stars, cc, gameWords.length);
  buildWeeklyStrip();
  showScreen('screen-result');
  sendResultEmail(uw, cc, stars);
}
function sendResultEmail(wrongList, correct, stars) {
  const statusEl = document.getElementById('emailStatus');
  statusEl.textContent = '✉️ 엄마에게 결과 전송 중...';
  statusEl.className = 'email-status';

  const diffLabel = {'very-easy':'아주쉬움 🌸','easy':'쉬움 🌱','normal':'보통 ⭐','hard':'어려움 🔥'}[difficulty] || difficulty;
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const wrongStr = wrongList.length === 0 ? '없음 🎉' : wrongList.map(w => `${w.word} (${w.meaning})`).join('\n');

  emailjs.send('service_8i49n2q', 'template_xly11pf', {
    date: dateStr,
    difficulty: diffLabel,
    stars: '⭐'.repeat(stars) + '☆'.repeat(3 - stars),
    total: String(gameWords.length),
    correct: String(correct),
    wrong_words: wrongStr,
  }).then(() => {
    statusEl.textContent = '✅ 엄마에게 결과를 보냈어요!';
    statusEl.className = 'email-status ok';
  }).catch((err) => {
    const msg = err && err.text ? err.text : (err && err.status ? 'status ' + err.status : JSON.stringify(err));
    console.error('EmailJS error:', err);
    statusEl.textContent = '⚠️ 전송 실패: ' + msg;
    statusEl.className = 'email-status err';
  });
}
function speakWord(word) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word); u.lang = 'en-US'; u.rate = 0.8; u.pitch = 1.1;
  window.speechSynthesis.speak(u);
}
function speakCurrent() { if (gameWords[currentIdx]) speakWord(gameWords[currentIdx].word); }
function toggleHint() {
  const hint = document.getElementById('hintText'), btn = document.getElementById('hintBtn');
  if (hint.textContent) {
    hint.textContent = '';
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21h6"/><path d="M10 17h4"/><path d="M12 3a6 6 0 014 10c-1 1-1.5 2-1.5 3h-5c0-1-.5-2-1.5-3a6 6 0 014-10z"/></svg> 힌트 보기`;
  } else {
    hint.textContent = gameWords[currentIdx].meaning;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21h6"/><path d="M10 17h4"/><path d="M12 3a6 6 0 014 10c-1 1-1.5 2-1.5 3h-5c0-1-.5-2-1.5-3a6 6 0 014-10z"/></svg> 힌트 숨기기`;
  }
}
let audioCtx = null;
function getAudioCtx() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function playSound(type) {
  try {
    const ctx = getAudioCtx();
    if (type === 'correct') {
      const o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination);
      o.frequency.setValueAtTime(660, ctx.currentTime); o.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + .12);
      g.gain.setValueAtTime(.22, ctx.currentTime); g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .25);
      o.start(); o.stop(ctx.currentTime + .25);
    } else if (type === 'wrong') {
      const o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination);
      o.type = 'sawtooth'; o.frequency.setValueAtTime(240, ctx.currentTime); o.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + .2);
      g.gain.setValueAtTime(.18, ctx.currentTime); g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .25);
      o.start(); o.stop(ctx.currentTime + .25);
    } else if (type === 'complete') {
      [523, 659, 784, 1047].forEach((freq, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain(); o.connect(g); g.connect(ctx.destination);
        o.frequency.setValueAtTime(freq, ctx.currentTime + i * .1); g.gain.setValueAtTime(.18, ctx.currentTime + i * .1);
        g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + i * .1 + .3);
        o.start(ctx.currentTime + i * .1); o.stop(ctx.currentTime + i * .1 + .35);
      });
    }
  } catch(e) {}
}
initStart();
